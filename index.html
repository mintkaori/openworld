<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3학년 2반 캐릭터 오픈월드 학교</title>
<style>
  html,body{margin:0;padding:0;overflow:hidden;height:100%;background:#9fd9ff;font-family:'Segoe UI','Malgun Gothic',sans-serif;}
  #app{position:fixed;inset:0;}
  .panel{position:fixed;z-index:10;background:rgba(255,255,255,.82);border:2px solid #ffd9a0;
    border-radius:14px;padding:10px 14px;box-shadow:0 4px 14px rgba(80,60,20,.18);}
  #title{top:12px;left:12px;max-width:330px;}
  #title h1{margin:0 0 4px;font-size:17px;color:#8a5a2b;}
  #title p{margin:2px 0;font-size:12px;color:#6b5a3e;line-height:1.5;}
  #title b{color:#d2691e;}
  #chips{position:fixed;z-index:10;left:50%;transform:translateX(-50%);bottom:72px;display:flex;
    flex-wrap:wrap;gap:6px;justify-content:center;max-width:92vw;}
  .chip{border:2px solid rgba(120,80,30,.25);border-radius:999px;padding:5px 12px;font-size:13px;
    font-weight:700;cursor:pointer;box-shadow:0 2px 6px rgba(60,40,10,.2);transition:transform .12s;}
  .chip:hover{transform:translateY(-3px) scale(1.06);}
  #err{position:fixed;z-index:99;bottom:8px;left:8px;max-width:90vw;background:#fff0f0;color:#b00;
    font-size:12px;padding:6px 10px;border-radius:8px;display:none;white-space:pre-wrap;}
  #toggleHelp{position:fixed;z-index:11;top:12px;right:12px;width:34px;height:34px;border-radius:50%;
    border:2px solid #ffd9a0;background:rgba(255,255,255,.85);font-size:18px;cursor:pointer;}
  @media (min-width:3000px) and (min-height:1600px){
    #title{top:72px;left:620px;max-width:420px;background:rgba(255,255,255,.64);}
    #title h1{font-size:18px;}
    #title p{font-size:13px;}
    #toggleHelp{top:72px;right:auto;left:1070px;}
    #chips{left:auto;right:720px;top:980px;bottom:auto;transform:none;display:grid;
      grid-template-columns:1fr;gap:8px;max-width:none;width:164px;}
    .chip{min-height:40px;padding:8px 12px;font-size:15px;text-align:center;}
    .chip:hover{transform:translateX(-4px) scale(1.04);}
  }
</style>
</head>
<body>
<div id="app"></div>
<div class="panel" id="title">
  <h1>🏫 3학년 2반 캐릭터 오픈월드</h1>
  <p>우리 반 친구들이 만든 캐릭터 10명이 학교에서 놀고 있어요!</p>
  <p>👆 <b>캐릭터 클릭</b> = 인사 · <b>바닥 클릭</b> = 모여라!</p>
  <p>⚡ <b>더블클릭</b> = 깜짝!! · 드래그 = 카메라 · 버튼 = 호출</p>
</div>
<button id="toggleHelp" title="설명 켜기/끄기">?</button>
<div id="chips"></div>
<div id="err"></div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const errBox = document.getElementById('err');
window.addEventListener('error', e=>{ errBox.style.display='block'; errBox.textContent='오류: '+e.message; });
document.getElementById('toggleHelp').onclick = ()=>{
  const t = document.getElementById('title');
  t.style.display = t.style.display==='none' ? '' : 'none';
};

/* ---------------- renderer / scene ---------------- */
const DESKTOP_WALLPAPER = innerWidth >= 3000 && innerHeight >= 1600;
const CHARACTER_SCALE = DESKTOP_WALLPAPER ? 1.32 : 1.18;
const DEFAULT_CAMERA_POSITION = new THREE.Vector3(0, DESKTOP_WALLPAPER ? 48 : 52, DESKTOP_WALLPAPER ? 78 : 92);
const DEFAULT_CAMERA_TARGET = new THREE.Vector3(0, DESKTOP_WALLPAPER ? 1.4 : 2, 0);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.getElementById('app').appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x9fd9ff);
scene.fog = new THREE.Fog(0xc4e7ff, 90, 230);

const camera = new THREE.PerspectiveCamera(DESKTOP_WALLPAPER ? 45 : 50, innerWidth/innerHeight, 0.1, 500);
camera.position.copy(DEFAULT_CAMERA_POSITION);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.copy(DEFAULT_CAMERA_TARGET);
controls.enableDamping = false;
controls.dampingFactor = 0.08;
controls.enableZoom = false;
controls.enablePan = false;
controls.maxPolarAngle = Math.PI*0.49;
controls.minDistance = 10;
controls.maxDistance = 140;

scene.add(new THREE.HemisphereLight(0xcfe9ff, 0x86a85e, 0.95));
const sun = new THREE.DirectionalLight(0xfff3d0, 1.45);
sun.position.set(45, 70, 35);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left=-75; sun.shadow.camera.right=75;
sun.shadow.camera.top=75; sun.shadow.camera.bottom=-75;
sun.shadow.camera.far = 220;
sun.shadow.bias = -0.0004;
scene.add(sun);

addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* ---------------- helpers ---------------- */
const M = (c,o={}) => new THREE.MeshStandardMaterial({color:c, roughness:.95, metalness:0, ...o});
function mesh(geo, mat, x=0,y=0,z=0, shadow=true){
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x,y,z);
  m.castShadow = shadow; m.receiveShadow = shadow;
  return m;
}
const sph = (r,c,x,y,z,sx=1,sy=1,sz=1)=>{ const m=mesh(new THREE.SphereGeometry(r,24,18),M(c),x,y,z); m.scale.set(sx,sy,sz); return m; };
const box = (w,h,d,c,x,y,z)=> mesh(new THREE.BoxGeometry(w,h,d),M(c),x,y,z);
const cyl = (rt,rb,h,c,x,y,z,seg=20)=> mesh(new THREE.CylinderGeometry(rt,rb,h,seg),M(c),x,y,z);
const cone = (r,h,c,x,y,z,seg=20)=> mesh(new THREE.ConeGeometry(r,h,seg),M(c),x,y,z);
const cap = (r,l,c,x,y,z)=> mesh(new THREE.CapsuleGeometry(r,l,6,14),M(c),x,y,z);
const torus = (r,t,c,x,y,z,arc=Math.PI*2)=> mesh(new THREE.TorusGeometry(r,t,12,28,arc),M(c),x,y,z);

function starShape(R=1,r=.45,n=5){
  const s = new THREE.Shape();
  for(let i=0;i<n*2;i++){
    const rad = i%2===0?R:r, a = i/(n*2)*Math.PI*2 - Math.PI/2;
    const x=Math.cos(a)*rad, y=Math.sin(a)*rad;
    i===0 ? s.moveTo(x,y) : s.lineTo(x,y);
  }
  s.closePath(); return s;
}
function starMesh(R,depth,c){
  const g = new THREE.ExtrudeGeometry(starShape(R,R*.45), {depth, bevelEnabled:false});
  g.center();
  return mesh(g, M(c));
}

function canvasTexture(w,h,draw){
  const cv = document.createElement('canvas'); cv.width=w; cv.height=h;
  draw(cv.getContext('2d'), w, h);
  const t = new THREE.CanvasTexture(cv);
  t.anisotropy = 4; t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
function spriteFromCanvas(draw, w, h, worldH){
  const tex = canvasTexture(w,h,draw);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({map:tex, transparent:true, depthWrite:false}));
  sp.scale.set(worldH*w/h, worldH, 1);
  return sp;
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function makeLabel(text, color){
  return spriteFromCanvas((ctx,w,h)=>{
    ctx.font = '700 44px "Malgun Gothic", sans-serif';
    const tw = ctx.measureText(text).width + 44;
    const x=(w-tw)/2;
    ctx.fillStyle='rgba(255,255,255,.88)';
    roundRect(ctx,x,18,tw,72,34); ctx.fill();
    ctx.lineWidth=6; ctx.strokeStyle=color; ctx.stroke();
    ctx.fillStyle='#5a4632'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(text, w/2, 56);
  }, 512,108, 0.95);
}
function makeBubble(text){
  return spriteFromCanvas((ctx,w,h)=>{
    ctx.font='700 52px "Malgun Gothic", sans-serif';
    const tw = Math.min(w-20, ctx.measureText(text).width+60);
    const x=(w-tw)/2;
    ctx.fillStyle='rgba(255,255,255,.96)';
    roundRect(ctx,x,12,tw,96,40); ctx.fill();
    ctx.strokeStyle='#f7a8c4'; ctx.lineWidth=7; ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(w/2-18,104); ctx.lineTo(w/2+20,104); ctx.lineTo(w/2,138); ctx.closePath();
    ctx.fillStyle='rgba(255,255,255,.96)'; ctx.fill();
    ctx.fillStyle='#7a4a2a'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(text, w/2, 62, tw-50);
  }, 1024,144, 1.5);
}
const heartTex = canvasTexture(128,128,(c)=>{
  c.fillStyle='#ff6fa5';
  c.beginPath(); c.moveTo(64,112);
  c.bezierCurveTo(8,72,16,24,52,28); c.bezierCurveTo(60,30,64,40,64,44);
  c.bezierCurveTo(64,40,68,30,76,28); c.bezierCurveTo(112,24,120,72,64,112);
  c.fill();
});
const sparkTex = canvasTexture(128,128,(c)=>{
  c.fillStyle='#ffd84d'; c.translate(64,64); c.beginPath();
  for(let i=0;i<8;i++){ const a=i/8*Math.PI*2, r=i%2?16:56;
    i===0?c.moveTo(Math.cos(a)*r,Math.sin(a)*r):c.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
  c.closePath(); c.fill();
});
const exclTex = canvasTexture(96,128,(c)=>{
  c.fillStyle='#ff5050'; c.font='900 120px sans-serif';
  c.textAlign='center'; c.textBaseline='middle'; c.fillText('!',48,64);
});
const noteTex = canvasTexture(96,128,(c)=>{
  c.fillStyle='#7a6cff'; c.font='900 96px sans-serif';
  c.textAlign='center'; c.textBaseline='middle'; c.fillText('♪',48,64);
});

/* particles */
const particles = [];
function puff(tex, pos, n=1, opt={}){
  for(let i=0;i<n;i++){
    const sp = new THREE.Sprite(new THREE.SpriteMaterial({map:tex, transparent:true, depthWrite:false}));
    const s = (opt.size||0.7)*(0.7+Math.random()*0.6);
    sp.scale.set(s,s,1);
    sp.position.copy(pos);
    sp.position.x += (Math.random()-0.5)*1.2;
    sp.position.z += (Math.random()-0.5)*1.2;
    scene.add(sp);
    particles.push({sp, t:0, life: opt.life||1.3,
      vel:new THREE.Vector3((Math.random()-.5)*0.8, 1.6+Math.random()*1.2, (Math.random()-.5)*0.8)});
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i]; p.t += dt;
    p.sp.position.addScaledVector(p.vel, dt);
    p.sp.material.opacity = Math.max(0, 1 - p.t/p.life);
    if(p.t>=p.life){ scene.remove(p.sp); p.sp.material.dispose(); particles.splice(i,1); }
  }
}

/* ---------------- ground & school ---------------- */
const ground = mesh(new THREE.PlaneGeometry(320,320), M(0x8fce7a), 0,0,0);
ground.rotation.x = -Math.PI/2; ground.castShadow=false;
scene.add(ground);

function ellipseShapeGeo(rx,rz, irx=0, irz=0){
  const s = new THREE.Shape();
  s.absellipse(0,0,rx,rz,0,Math.PI*2);
  if(irx>0){ const h = new THREE.Path(); h.absellipse(0,0,irx,irz,0,Math.PI*2); s.holes.push(h); }
  return new THREE.ShapeGeometry(s, 48);
}
/* 운동장 흙바닥 + 트랙 */
const dirt = mesh(ellipseShapeGeo(40,26), M(0xead9ae), 0,0.02,-4, false);
dirt.rotation.x=-Math.PI/2; dirt.receiveShadow=true; scene.add(dirt);
const track = mesh(ellipseShapeGeo(34,20, 27,14), M(0xe0876a), 0,0.04,-4, false);
track.rotation.x=-Math.PI/2; track.receiveShadow=true; scene.add(track);
const field = mesh(ellipseShapeGeo(27,14), M(0x7cc46a), 0,0.05,-4, false);
field.rotation.x=-Math.PI/2; field.receiveShadow=true; scene.add(field);
for(const f of [29.2, 31.8]){
  const pts=[]; for(let i=0;i<=80;i++){ const a=i/80*Math.PI*2;
    pts.push(new THREE.Vector3(Math.cos(a)*f, 0.07, -4+Math.sin(a)*f*(20/34))); }
  scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({color:0xffffff})));
}

/* 학교 건물 */
const school = new THREE.Group();
const bodyB = box(50,13,10, 0xfff2d8, 0,6.5,0); school.add(bodyB);
school.add(box(52,1.2,12, 0xe7795f, 0,13.6,0));            // roof
school.add(box(6,1.2,12, 0xe7795f, 0,7.4,0.6));            // door canopy
school.add(box(3.6,4.6,0.4, 0x8a5a33, 0,2.3,5.1));         // door
school.add(box(10,0.6,4, 0xd9c6a0, 0,0.3,6.4));            // steps
for(let fl=0; fl<2; fl++) for(let i=0;i<8;i++){
  if(i===3||i===4) continue;
  school.add(box(3.4,2.6,0.25, 0xaee2ff, -21+i*6, 4+fl*5.6, 5.05));
  school.add(box(3.8,0.3,0.3, 0xffffff, -21+i*6, 2.6+fl*5.6, 5.1));
}
const clock = cyl(1.4,1.4,0.3, 0xffffff, 0,11.5,5.2); clock.rotation.x=Math.PI/2; school.add(clock);
school.add(box(0.15,1,0.1, 0x333333, 0,11.9,5.4));
school.add(box(0.8,0.15,0.1, 0x333333, 0.35,11.5,5.4));
const signTex = canvasTexture(1024,160,(c,w,h)=>{
  c.fillStyle='#fffdf4'; roundRect(c,4,4,w-8,h-8,28); c.fill();
  c.strokeStyle='#caa86a'; c.lineWidth=8; c.stroke();
  c.fillStyle='#4f6f3a'; c.font='900 92px "Malgun Gothic", sans-serif';
  c.textAlign='center'; c.textBaseline='middle';
  c.fillText('황지중앙초등학교', w/2, h/2+4);
});
const sign = mesh(new THREE.PlaneGeometry(14,2.2),
  new THREE.MeshBasicMaterial({map:signTex, transparent:true}), 0,8.9,5.15);
school.add(sign);
school.position.set(0,0,-48);
scene.add(school);

/* 태극기 게양대 */
function taegeukCanvas(c,w,h){
  c.fillStyle='#ffffff'; c.fillRect(0,0,w,h);
  const cx=w/2, cy=h/2, R=h*0.25;
  c.fillStyle='#cd2e3a'; c.beginPath(); c.arc(cx,cy,R,Math.PI,0); c.fill();
  c.fillStyle='#0047a0'; c.beginPath(); c.arc(cx,cy,R,0,Math.PI); c.fill();
  c.fillStyle='#cd2e3a'; c.beginPath(); c.arc(cx-R/2,cy,R/2,0,Math.PI*2); c.fill();
  c.fillStyle='#0047a0'; c.beginPath(); c.arc(cx+R/2,cy,R/2,0,Math.PI*2); c.fill();
  c.fillStyle='#000';
  const bar=(bx,by,rot,gaps)=>{ c.save(); c.translate(bx,by); c.rotate(rot);
    for(let i=-1;i<=1;i++){ if(gaps.includes(i)){
        c.fillRect(-R*0.55,i*R*0.22-R*0.07,R*0.5,R*0.14);
        c.fillRect(R*0.05,i*R*0.22-R*0.07,R*0.5,R*0.14);
      } else c.fillRect(-R*0.55,i*R*0.22-R*0.07,R*1.1,R*0.14); }
    c.restore(); };
  bar(cx-R*1.7, cy-R*0.95, -Math.PI/5.2, []);
  bar(cx+R*1.7, cy-R*0.95,  Math.PI/5.2, [-1,1]);
  bar(cx-R*1.7, cy+R*0.95,  Math.PI/5.2, [0]);
  bar(cx+R*1.7, cy+R*0.95, -Math.PI/5.2, [-1,0,1]);
}
const flagGroup = new THREE.Group();
flagGroup.add(cyl(0.12,0.16,15, 0xcccccc, 0,7.5,0,10));
flagGroup.add(sph(0.3,0xffd84d,0,15.1,0));
const flagTex = canvasTexture(360,240,taegeukCanvas);
const flag = mesh(new THREE.PlaneGeometry(4.4,2.9),
  new THREE.MeshBasicMaterial({map:flagTex, side:THREE.DoubleSide}), 2.35,13.2,0, false);
flagGroup.add(flag);
flagGroup.position.set(-24,0,-34);
scene.add(flagGroup);

/* 나무들 + 뭉키 나무 */
function tree(x,z,s=1, big=false){
  const g = new THREE.Group();
  g.add(cyl(0.45*s,0.6*s, big?8:4.5, 0x8a5a33, 0,(big?4:2.2),0,10));
  const leaf = 0x5fae54;
  if(big){
    g.add(sph(3.4,leaf, 0,9,0)); g.add(sph(2.6,0x6fc063, 2.4,7.8,0.6));
    g.add(sph(2.4,0x6fc063, -2.3,7.6,-0.5)); g.add(sph(2,0x7ccd6f, 0.4,7,2));
  } else {
    g.add(sph(2.1*s,leaf, 0,5*s,0)); g.add(sph(1.5*s,0x6fc063, 1.4*s,4.2*s,0.4));
    g.add(sph(1.4*s,0x7ccd6f, -1.3*s,4.1*s,-0.3));
  }
  g.position.set(x,0,z); scene.add(g); return g;
}
const monkeyTree = tree(40,-14, 1, true);
tree(-46,-30,1.1); tree(46,-34,0.9); tree(52,8,1); tree(-52,2,0.95);
tree(30,40,0.85); tree(-44,32,1.05); tree(54,28,0.9);

/* 트램펄린 (사랑이) */
const tramp = new THREE.Group();
tramp.add(cyl(3,3,0.3, 0x444b55, 0,1.05,0,28));
const trampRim = torus(3,0.32, 0x808a99, 0,1.2,0);
trampRim.rotation.x = Math.PI/2;
tramp.add(trampRim);
for(let i=0;i<4;i++){ const a=i/4*Math.PI*2+Math.PI/4;
  tramp.add(cyl(0.12,0.12,1.1, 0x666e7a, Math.cos(a)*2.6,0.55,Math.sin(a)*2.6,8)); }
tramp.position.set(-36,0,12); scene.add(tramp);

/* 모래밭 + 상자 + 우산 (리노) */
const sandG = new THREE.Group();
const sand = cyl(5,5,0.25, 0xf3e3b8, 0,0.13,0,28); sandG.add(sand);
const sandRim = torus(5,0.3,0xc9a96b,0,0.25,0); sandRim.rotation.x=Math.PI/2; sandG.add(sandRim);
const catBox = new THREE.Group();
const bc = 0xc89b62;
catBox.add(box(2.6,0.12,2.2, bc, 0,0.06,0));
catBox.add(box(2.6,1.2,0.12, bc, 0,0.6,1.04));
catBox.add(box(2.6,1.2,0.12, bc, 0,0.6,-1.04));
catBox.add(box(0.12,1.2,2.2, bc, 1.24,0.6,0));
catBox.add(box(0.12,1.2,2.2, bc, -1.24,0.6,0));
const flap = box(1.2,0.1,2.2, 0xb78a52, 1.85,1.18,0); flap.rotation.z=0.5; catBox.add(flap);
catBox.position.set(1.2,0.25,0.4); sandG.add(catBox);
const umb = new THREE.Group();
const umbTop = cone(2,1.2, 0xf6a8c0, 0,2.9,0,10); umb.add(umbTop);
umb.add(sph(0.12,0xd87898,0,3.55,0));
umb.add(cyl(0.07,0.07,2.6, 0xb05c7e, 0,1.5,0,8));
umb.rotation.z = 0.28; umb.position.set(-0.6,0.2,-1.4); sandG.add(umb);
sandG.position.set(32,0,18); scene.add(sandG);

/* 딸기밭 (코돌이) */
const berry = new THREE.Group();
for(let r=0;r<2;r++){
  const row = box(7,0.5,1.6, 0x7a5230, 0,0.25, r*2.4-1.2); berry.add(row);
  for(let i=0;i<5;i++){
    berry.add(sph(0.28,0xe23b4e, -2.8+i*1.4, 0.62, r*2.4-1.2));
    berry.add(cone(0.16,0.25, 0x4f8f3d, -2.8+i*1.4, 0.92, r*2.4-1.2, 6));
  }
}
const crate = new THREE.Group();
crate.add(box(1.6,0.8,1.2, 0xb78a52, 0,0.4,0));
crate.add(sph(0.3,0xe23b4e, -0.3,0.9,0)); crate.add(sph(0.3,0xe23b4e, 0.3,0.92,0.15));

function limb(r, len, color){

/* 기본 2족 캐릭터: 머리/몸/팔/다리 */
function biped(o){
  const g = new THREE.Group();
  const legH = o.legH ?? 0.42, bodyH = o.bodyH ?? 0.62, bodyR = o.bodyR ?? 0.4;
  const headR = o.headR ?? 0.62;
  const legs = [limb(o.legR??0.13, legH, o.legC??o.skin), limb(o.legR??0.13, legH, o.legC??o.skin)];
  legs[0].position.set(-bodyR*0.5, legH+0.16, 0);
  legs[1].position.set( bodyR*0.5, legH+0.16, 0);
  g.add(legs[0], legs[1]);
  const bodyY = legH + bodyH/2 + 0.05;
  const body = cap(bodyR, bodyH*0.6, o.bodyC??o.skin, 0, bodyY, 0);
  g.add(body);
  const arms = [limb(o.armR??0.11, o.armH??0.44, o.armC??o.skin), limb(o.armR??0.11, o.armH??0.44, o.armC??o.skin)];
  arms[0].position.set(-bodyR-0.06, bodyY+bodyH*0.22, 0);
  arms[1].position.set( bodyR+0.06, bodyY+bodyH*0.22, 0);
  g.add(arms[0], arms[1]);
  const headG = new THREE.Group();
  const head = sph(headR, o.headC??o.skin, 0,0,0);
  headG.add(head);
  headG.position.set(0, bodyY+bodyH/2+headR*0.74, 0);
  g.add(headG);
  return {g, head, headG, body, arms, legs, headTop: headG.position.y + headR, headR, bodyY, bodyH, bodyR};
}
function eyes(headG, headR, c=0x2b2118, dx=0.22, dy=0.05, r=0.07, fz=0.92){
  headG.add(sph(r,c,-dx*headR/0.6, dy, headR*fz));
  headG.add(sph(r,c, dx*headR/0.6, dy, headR*fz));
}
function blush(headG, headR, dx=0.34){
  headG.add(sph(0.09,0xffb3c1,-dx, -0.12, headR*0.85, 1,0.7,0.5));
  headG.add(sph(0.09,0xffb3c1, dx, -0.12, headR*0.85, 1,0.7,0.5));
}

  });
  function stickToFace(o, lift=0.025){
    const pos = o.geometry?.attributes?.position;
    if(!pos) return;
    for(let i=0;i<pos.count;i++){
      const x = o.position.x + pos.getX(i);
      const y = o.position.y + pos.getY(i);
      const z = Math.sqrt(Math.max(0.001, headR*headR - x*x - y*y)) + lift;
      pos.setZ(i, z - o.position.z);

    pos.needsUpdate = true;
    o.geometry.computeVertexNormals?.();

  const halfC = (col, start)=> {
    const m = new THREE.Mesh(new THREE.CircleGeometry(0.36,32,start,Math.PI),
      faceMat(col)); return m; };

  const eye=(x)=>{ const w=new THREE.Mesh(new THREE.CircleGeometry(0.085,16),
      faceMat(0xffffff)); w.position.set(x,0.18,0.008);
    const p=new THREE.Mesh(new THREE.CircleGeometry(0.045,12),
      faceMat(0x222222)); p.position.set(x,0.18,0.012);
    f.add(w,p); };
  eye(-0.16); eye(0.16);
  const smile = new THREE.Mesh(new THREE.TorusGeometry(0.1,0.02,12,28,Math.PI), faceMat(0x222222));
  smile.position.set(0,-0.1,0.01);
  smile.rotation.z = Math.PI; f.add(smile);
  f.position.set(0,-0.03,0);
  f.traverse(o=>{
    o.renderOrder = 20;
    if(o.isMesh) stickToFace(o);
  });
  b.headG.add(f);
  for(const s of [-1,1]) for(let i=0;i<3;i++){
    const bar = new THREE.Mesh(new THREE.PlaneGeometry(0.2,0.045), faceMat(0x222222));
    bar.position.set(s*0.47, 0.12-i*0.11, 0);
    bar.renderOrder = 19;
    stickToFace(bar, 0.03);
    b.headG.add(bar);
  }
  const helm = sph(0.62,0x2e2e2e, 0,0.4,-0.08, 1.12,0.62,1.04);
  b.headG.add(helm);
  const brim = torus(0.62,0.07,0x2e2e2e, 0,0.3,-0.08); brim.rotation.x=Math.PI/2;
  b.headG.add(brim);
  for(const s of [-1,1]){

/* ---------------- Kid (행동/상태) ---------------- */
const WORLD = {minX:-54, maxX:54, minZ:-38, maxZ:42};
const kids = [];
const tmpV = new THREE.Vector3();

class Kid {
  constructor(cfg){
    Object.assign(this, cfg); // name, owner, line, color, build, home, speed, moveStyle, play, scale, followRadius
    const b = this.build;
    this.b = b;
    this.g = b.g;
    this.baseScale = (this.scale ?? 1) * CHARACTER_SCALE;
    this.g.scale.setScalar(this.baseScale);
    this.g.position.copy(this.home);
    this.state = 'play';
    this.phase = Math.random()*10;
    this.playT = Math.random()*10;
    this.walkAmt = 0;
    this.heading = Math.random()*Math.PI*2;
    this.g.rotation.y = this.heading;
    this.offA = Math.random()*Math.PI*2;
    this.bubble = null; this.bubbleT = 0;
    this.startleT = 0; this.celebT = 0;
    this.gotoTarget = null;
    this.label = makeLabel(`${this.name} · ${this.owner}`, this.color);
    this.label.position.y = (b.headTop + 0.75);
    this.g.add(this.label);
    scene.add(this.g);
  }
  get pos(){ return this.g.position; }
  say(text){
    if(this.bubble){ this.g.remove(this.bubble); this.bubble.material.map.dispose(); this.bubble.material.dispose(); }
    this.bubble = makeBubble(text ?? this.line);
    this.bubble.position.y = this.b.headTop + 1.7;
    this.g.add(this.bubble);
    this.bubbleT = 2.8;
  }
  startle(){
    this.startleT = 1.4;
    puff(exclTex, this.pos.clone().add(new THREE.Vector3(0, this.b.headTop*this.g.scale.x+1, 0)), 1, {size:1, life:1});
  }
  moveToward(target, dt, mul=1){
    tmpV.copy(target).sub(this.pos); tmpV.y = 0;
    const d = tmpV.length();
    if(d > 0.05){
      const want = Math.atan2(tmpV.x, tmpV.z);
      let diff = want - this.heading;
      while(diff > Math.PI) diff -= Math.PI*2;
      while(diff < -Math.PI) diff += Math.PI*2;
      this.heading += diff * Math.min(1, dt*7);
      this.g.rotation.y = this.heading;
      const step = Math.min(d, this.speed*mul*dt);
      this.pos.x += Math.sin(this.heading)*step;
      this.pos.z += Math.cos(this.heading)*step;
      this.pos.x = THREE.MathUtils.clamp(this.pos.x, WORLD.minX, WORLD.maxX);
      this.pos.z = THREE.MathUtils.clamp(this.pos.z, WORLD.minZ, WORLD.maxZ);
      this.walkAmt = Math.min(1, this.walkAmt + dt*6);
    } else this.walkAmt = Math.max(0, this.walkAmt - dt*6);
    return d;
  }
  idle(){ this.walkAmt = Math.max(0, this.walkAmt - 0.06); }
  locomote(dt, t){
    const b = this.b, w = this.walkAmt;
    this.phase += dt * (this.speed*1.5) * (w>0.05?1:0.3);
    const s = Math.sin(this.phase), c = Math.cos(this.phase);
    if(this.moveStyle === 'hop'){
      const yBase = this.hopBaseY ?? 0;
      this.g.position.y = yBase + Math.abs(Math.sin(this.phase*1.4)) * 0.45 * Math.max(w, 0.25);
      const sq = 1 - Math.sin(this.phase*1.4)*0.06;
      const sc = this.baseScale;
      this.g.scale.set(sc, sc*sq, sc);
    } else if(this.moveStyle === 'skate'){
      this.g.position.y = 0;
      this.g.rotation.z = s*0.06*w;
      b.legs.forEach(l=> l.rotation.x = 0.15);
      b.arms[0].rotation.x = 0.5*w; b.arms[1].rotation.x = -0.3*w;
    } else {
      const amp = this.moveStyle==='march' ? 0.85 : 0.55;
      b.legs[0].rotation.x = s*amp*w;
      b.legs[1].rotation.x = -s*amp*w;
      b.arms[0].rotation.x = -s*amp*0.8*w;
      b.arms[1].rotation.x = s*amp*0.8*w;
      if(this.moveStyle==='march'){
        b.arms[0].rotation.x = -s*1.1*w; b.arms[1].rotation.x = s*1.1*w;
      }
      if(w > 0.1){ // 걷는 동안 특수 포즈(경례 등) 자연스럽게 풀기
        b.arms[0].rotation.z *= 1-Math.min(1,dt*4);
        b.arms[1].rotation.z *= 1-Math.min(1,dt*4);
      }
      this.g.position.y = Math.abs(s)*0.08*w + Math.sin(t*2+this.offA)*0.02;
    }
  }
  update(dt, t){
    if(this.bubble){
      this.bubbleT -= dt;
      if(this.bubbleT <= 0){ this.g.remove(this.bubble); this.bubble=null; }
    }
    if(this.startleT > 0){
      this.startleT -= dt;
      const k = Math.max(0, this.startleT/1.4);
      this.g.position.y = Math.abs(Math.sin(k*Math.PI*3)) * 0.8;
      this.idle();
      return;
    }
    if(this.celebT > 0){
      this.celebT -= dt;
      this.g.position.y = Math.abs(Math.sin(this.celebT*9)) * 0.5;
      if(Math.random() < dt*2) puff(heartTex, this.pos.clone().setY(this.b.headTop*0.8), 1, {size:0.55});
      if(this.celebT <= 0) this.state = 'return';
      return;
    }
    if(this.state === 'goto' && this.gotoTarget){
      const d = this.moveToward(this.gotoTarget, dt, 1.25);
      this.locomote(dt, t);
      if(d < 1){ this.celebT = 1.1; this.gotoTarget=null; }
      return;
    }
    if(this.state === 'return'){
      const d = this.moveToward(this.home, dt);
      this.locomote(dt, t);
      if(d < 0.8){ this.state='play'; this.playT = 0; }
      return;
    }
    this.playT += dt;
    this.play(this, dt, t);
    this.locomote(dt, t);
  }
}

/* ----- 놀이 행동들 ----- */
function wanderPlay(center, radius, pauseMin=3, pauseMax=7){
  return (k, dt)=>{
    if(!k._tgt || k._wait > 0){
      if(k._wait > 0){ k._wait -= dt; k.idle(); return; }
      const a = Math.random()*Math.PI*2, r = Math.random()*radius;
      k._tgt = new THREE.Vector3(center.x+Math.cos(a)*r, 0, center.z+Math.sin(a)*r);
    }
    const d = k.moveToward(k._tgt, dt, 0.4);
    if(d < 0.5){ k._tgt = null; k._wait = pauseMin + Math.random()*(pauseMax-pauseMin); }
  };
}

});

/* ---------------- 칩 UI ---------------- */
const chipsEl = document.getElementById('chips');
let camAnim = null;
function flyCamera(toP, toT, dur=1.1){
  camAnim = {
    t:0, dur,
    fromP: camera.position.clone(), fromT: controls.target.clone(),
    toP: toP.clone(), toT: toT.clone()
  };
}
const resetCam = document.createElement('button');
resetCam.className = 'chip chip-reset';
resetCam.textContent = '기본 위치';
resetCam.style.background = '#f7f3df';
resetCam.style.color = '#6b5a3e';
resetCam.style.borderColor = 'rgba(138,90,43,.45)';
resetCam.onclick = ()=>{
  camAnim = null;
  controls.reset();
  camera.position.copy(DEFAULT_CAMERA_POSITION);
  controls.target.copy(DEFAULT_CAMERA_TARGET);
  controls.update();
};
chipsEl.appendChild(resetCam);
kids.forEach((k,i)=>{
  const c = document.createElement('button');
  c.className='chip';
  c.textContent = k.name;
  c.style.background = k.color; c.style.color = '#fff';
  c.style.textShadow = '0 1px 2px rgba(0,0,0,.35)';
  c.onclick = ()=>{
    k.say(k.line);
    puff(heartTex, k.pos.clone().setY(2), 4, {size:0.6});
    const dir = new THREE.Vector3().subVectors(camera.position, controls.target);
    dir.y = 0; dir.normalize(); if(dir.lengthSq() < 0.5) dir.set(0,0,1);
    dir.y = 0.42; dir.normalize();
    const toT = k.pos.clone().setY(1.6);
    flyCamera(toT.clone().addScaledVector(dir, 13), toT, 1.1);
  };
  chipsEl.appendChild(c);
});

/* ---------------- 마우스 인터랙션 ---------------- */
const ray = new THREE.Raycaster();
const ndc = new THREE.Vector2();
const groundPlane = new THREE.Plane(new THREE.Vector3(0,1,0), 0);

const kidMeshes = [];
kids.forEach((k,i)=> k.g.traverse(o=>{ if(o.isMesh){ o.userData.kid=i; kidMeshes.push(o); } }));

let downPos = null;
function inCameraDragZone(e){
  const left = DESKTOP_WALLPAPER ? innerWidth * 0.24 : innerWidth * 0.14;
  const right = DESKTOP_WALLPAPER ? innerWidth * 0.74 : innerWidth * 0.86;
  const top = DESKTOP_WALLPAPER ? innerHeight * 0.18 : innerHeight * 0.12;
  const bottom = DESKTOP_WALLPAPER ? innerHeight * 0.84 : innerHeight * 0.88;
  return e.clientX >= left && e.clientX <= right && e.clientY >= top && e.clientY <= bottom;
}
renderer.domElement.addEventListener('pointerdown', e=>{
  if(!inCameraDragZone(e)){
    downPos = null;
    controls.enableRotate = false;
    e.stopImmediatePropagation();
    return;
  }
  controls.enableRotate = true;
}, {capture:true});
addEventListener('pointerup', ()=>{ controls.enableRotate = true; }, {capture:true});
addEventListener('pointercancel', ()=>{ controls.enableRotate = true; }, {capture:true});
renderer.domElement.addEventListener('pointerdown', e=>{ downPos = [e.clientX, e.clientY]; });
renderer.domElement.addEventListener('click', e=>{
  if(downPos){
    const dx=e.clientX-downPos[0], dy=e.clientY-downPos[1];
    if(dx*dx+dy*dy > 36) return; // 드래그였음
  }
  ndc.set(e.clientX/innerWidth*2-1, -(e.clientY/innerHeight)*2+1);
  ray.setFromCamera(ndc, camera);
  const hits = ray.intersectObjects(kidMeshes, false);
  if(hits.length){
    const k = kids[hits[0].object.userData.kid];
    k.say(k.line);
    k.celebT = 1.3;
    puff(heartTex, k.pos.clone().setY(k.b.headTop), 5, {size:0.6});
    return;
  }
  const hit = new THREE.Vector3();
  if(ray.ray.intersectPlane(groundPlane, hit)){
    /* 모여라! */
    const ring = torus(0.5,0.08,0xfff1b0, hit.x,0.1,hit.z);
    ring.rotation.x=Math.PI/2; scene.add(ring);
    ripples.push({m:ring, t:0});
    puff(sparkTex, hit.clone().setY(0.5), 3, {size:0.7});
    let n=0;
    for(const k of kids){
      if(k.pos.distanceTo(hit) < 14 && k.state!=='goto'){
        const a = (n++)*1.1;
        k.state='goto';
        k.gotoTarget = hit.clone().add(new THREE.Vector3(Math.cos(a)*1.8,0,Math.sin(a)*1.8));
      }
    }
  }
});
renderer.domElement.addEventListener('dblclick', ()=>{
  kids.forEach(k=>{ k.startle(); k.say('깜짝이야!'); });
});
const ripples = [];

/* ---------------- main loop ---------------- */
const clock2 = new THREE.Clock();
window.__ow = { kids, camera, controls, inCameraDragZone };
function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock2.getDelta(), 0.05);
  const t = clock2.elapsedTime;

  for(const k of kids) k.update(dt, t);

  /* 파닥이 별친구 따라다니기 */
  const star = padak.b.buddy;
  tmpV.copy(padak.pos).add(new THREE.Vector3(Math.sin(padak.heading-2.2)*1.5,0,Math.cos(padak.heading-2.2)*1.5));
  star.position.lerp(tmpV, Math.min(1,dt*3));
  star.position.y = 0.2+Math.abs(Math.sin(t*3))*0.3;
  star.rotation.y += dt;

  /* 공 물리 */
  ball.position.addScaledVector(ballVel, dt);
  ballVel.multiplyScalar(Math.max(0, 1-dt*1.2));
  ball.rotation.x += ballVel.z*dt*2; ball.rotation.z -= ballVel.x*dt*2;
  if(Math.abs(ball.position.x) > 24){ ball.position.x=Math.sign(ball.position.x)*24; ballVel.x*=-0.8; }
  if(ball.position.z < -14 || ball.position.z > 8){
    ball.position.z = THREE.MathUtils.clamp(ball.position.z,-14,8); ballVel.z*=-0.8; }

  /* 깃발 펄럭 */
  flag.rotation.y = Math.sin(t*2.2)*0.16;
  flag.position.x = 2.35 + Math.sin(t*2.2)*0.1;

  /* 구름 */
  for(const c of clouds){ c.position.x += dt*1.1; if(c.position.x > 110) c.position.x = -110; }

  /* 물결 링 */
  for(let i=ripples.length-1;i>=0;i--){
    const r = ripples[i]; r.t += dt;
    const s = 1 + r.t*6;
    r.m.scale.set(s,s,1);
    r.m.material.opacity = 1-r.t/0.8; r.m.material.transparent = true;
    if(r.t>0.8){ scene.remove(r.m); ripples.splice(i,1); }
  }

  updateParticles(dt);

  if(camAnim){
    camAnim.t += dt;
    const u = Math.min(1, camAnim.t/camAnim.dur);
    const e = u<0.5 ? 2*u*u : 1-Math.pow(-2*u+2,2)/2;
    camera.position.lerpVectors(camAnim.fromP, camAnim.toP, e);
    controls.target.lerpVectors(camAnim.fromT, camAnim.toT, e);
    if(u>=1) camAnim=null;
  }
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
