/* ================= 신규 이벤트들 ================= */
function faceKidToward(k, target, dt, rate=6){
  const dx=target.x-k.pos.x, dz=target.z-k.pos.z;
  if(dx*dx+dz*dz>1e-4){ const want=Math.atan2(dx,dz); let diff=want-k.heading;
    while(diff>Math.PI)diff-=Math.PI*2; while(diff<-Math.PI)diff+=Math.PI*2;
    k.heading+=diff*Math.min(1,dt*rate); k.g.rotation.y=k.heading; }
}

  return g;
}

/* 1) 딱지치기 — 전체 아이들이 짝을 지어서 */
function makeDdakjiEvt(){
  const avail = shuffle(kids.filter(k=>k.state==='play'));
  if(avail.length < 4) return null;
  const pairCount = Math.floor(avail.length/2);
  const members = avail.slice(0, pairCount*2);
  const pairs = [], tiles = [];
  const tileCols = [0xe23b4e,0x3f7fd9,0xf2c94c,0x4f9fd9,0xf2729a,0x6fc063];
  for(let i=0;i<pairCount;i++){
    const a=i/pairCount*Math.PI*2;
    const cx=Math.cos(a)*13, cz=-4+Math.sin(a)*8;
    const fx=Math.cos(a+Math.PI/2), fz=Math.sin(a+Math.PI/2);
    const tile=mesh(new THREE.BoxGeometry(0.85,0.14,0.85), M(tileCols[i%tileCols.length]), cx,0.07,cz);
    scene.add(tile); tiles.push(tile);
    pairs.push({ k1:members[2*i], k2:members[2*i+1],
      p1:new THREE.Vector3(cx+fx*1.25,0,cz+fz*1.25), p2:new THREE.Vector3(cx-fx*1.25,0,cz-fz*1.25),
      mid:new THREE.Vector3(cx,0,cz), tile, turn:0, slapT:1.2+Math.random()*1.0, win:0 });
  }
  members.forEach(k=>{ k.state='event'; k.gotoTarget=null; k.celebT=0; k.startleT=0; k.walkAmt=0; });
  let phase='gather', pt=0, cleaned=false, said=false;
  const finish=()=>{ if(cleaned)return; cleaned=true;
    tiles.forEach(tl=>{ scene.remove(tl); tl.geometry.dispose(); tl.material.dispose(); });
    members.forEach(k=>{ if(k.b.arms?.[1]) k.b.arms[1].rotation.x=0; });
    release(members); };
  return {kind:'ddakji', cancel:finish, update(dt,t){
    pt+=dt;
    if(phase==='gather'){
      let all=true;
      for(const pr of pairs){
        const d1=pr.k1.moveToward(pr.p1,dt,0.95); pr.k1.locomote(dt,t);
        const d2=pr.k2.moveToward(pr.p2,dt,0.95); pr.k2.locomote(dt,t);
        if(d1>=0.6||d2>=0.6) all=false;
      }
      if(all){ phase='play'; pt=0; if(!said){said=true; pairs[0].k1.say('딱지치기 하자!');} }
    } else if(phase==='play'){
      for(const pr of pairs){
        faceKidToward(pr.k1, pr.mid, dt); faceKidToward(pr.k2, pr.mid, dt);
        pr.k1.idle(); pr.k1.locomote(dt,t); pr.k2.idle(); pr.k2.locomote(dt,t);
        const thrower = pr.turn%2===0?pr.k1:pr.k2;
        const arm = thrower.b.arms?.[1];
        pr.slapT -= dt;
        /* 팔을 들었다가 내려치는 동작 */
        if(arm){
          const s = pr.slapT;
          arm.rotation.x = s>0.35 ? -2.2*Math.min(1,(s-0.35)/0.7) : -2.2*(s/0.35);
        }
        if(pr.slapT<=0){
          pr.tile.rotation.x += Math.PI*(Math.random()<0.5?1:-1)*0.5;
          pr.tile.position.y = 0.07 + 0.5; pr.tile.userData.fall=true;
          puff(sparkTex, pr.tile.position.clone().setY(0.5), 2, {size:0.4});
          if(Math.random()<0.55) thrower.say(pick(['딱!','넘어가라!','내가 이겼다!','한 판 더!','으랏차!']));
          pr.turn++; pr.slapT = 1.3+Math.random()*1.1;
        }
        if(pr.tile.position.y>0.07){ pr.tile.position.y=Math.max(0.07, pr.tile.position.y-dt*3); }
      }
      if(pt>24){ phase='end'; pt=0; }
    } else {
      members.forEach(k=>{ k.idle(); k.locomote(dt,t); if(k.b.arms?.[1]) k.b.arms[1].rotation.x*=Math.max(0,1-dt*4); });
      if(pt>2){ finish(); return true; }
    }
    return false;
  }};
}

/* 2) 한국사랑 + 태권도 시범단 — 운동장 가운데, 다른 친구들은 구경 */
function createTaekwondoMember(){
  const b = biped({skin:0xf3f3f3, headR:0.6, headC:0xffffff, bodyC:0xffffff, legC:0xffffff, armC:0xffffff, legH:0.42});
  const faceGeo = new THREE.SphereGeometry(b.headR*1.012, 40, 30, Math.PI/2-0.92, 1.84, Math.PI/2-0.78, 1.56);
  const face = new THREE.Mesh(faceGeo, new THREE.MeshBasicMaterial({map:koreaFaceTex, transparent:true, depthWrite:false}));
  face.renderOrder=4; face.castShadow=false; face.receiveShadow=false; b.headG.add(face);
  const belt = torus(b.bodyR+0.04,0.07,0x1a1a1a, 0,b.bodyY-0.04,0); belt.rotation.x=Math.PI/2; b.g.add(belt);
  const band = torus(b.headR*0.94,0.05,0xcd2e3a, 0,0.1,0.04); band.rotation.x=Math.PI/2; b.headG.add(band);
  toonify(b.g);
  b.g.traverse(o=>{ if(o.isMesh && !o.userData.isOutline) o.receiveShadow=false; });
  return b;
}
function makeTaekwondoEvt(){
  const korea = kids.find(k=>k.name==='한국사랑' && k.state==='play');
  if(!korea) return null;
  const audience = shuffle(kids.filter(k=>k.state==='play' && k!==korea));
  if(audience.length < 2) return null;
  const center = new THREE.Vector3(0,0,-2);
  const team = [createTaekwondoMember(), createTaekwondoMember()];
  team.forEach((tm,i)=>{ tm.g.position.set(center.x+(i===0?-2.4:2.4), 0, center.z-0.3); tm.g.scale.setScalar(1.06); scene.add(tm.g); });
  const performers = [{b:korea.b, k:korea, x:center.x}, {b:team[0], k:null, x:center.x-2.4}, {b:team[1], k:null, x:center.x+2.4}];
  const audPos = audience.map((k,i)=>{ const a=-0.9 + (i/(audience.length-1||1))*1.8;
    return new THREE.Vector3(center.x+Math.sin(a)*9, 0, center.z+6.5+Math.cos(a)*2.5); });
  [korea,...audience].forEach(k=>{ k.state='event'; k.gotoTarget=null; k.celebT=0; k.startleT=0; k.walkAmt=0; });
  let phase='gather', pt=0, cleaned=false, moveN=0, nextMove=0;
  const cue=cueRunner();
  const finish=()=>{ if(cleaned)return; cleaned=true;
    team.forEach(tm=>{ scene.remove(tm.g); });
    performers.forEach(p=>{ if(p.b.arms){p.b.arms[0].rotation.set(0,0,0);p.b.arms[1].rotation.set(0,0,0);} if(p.b.legs){p.b.legs[0].rotation.set(0,0,0);p.b.legs[1].rotation.set(0,0,0);} });
    release([korea,...audience]); };
  const doPose=(b, kind, u)=>{ /* u:0~1 진행 */
    const a0=b.arms?.[0], a1=b.arms?.[1], l0=b.legs?.[0], l1=b.legs?.[1];
    const s=Math.sin(u*Math.PI);
    if(!a0) return;
    if(kind==='punch'){ a0.rotation.set(0,0,0); a1.rotation.x=-1.6*s; }
    else if(kind==='kick'){ if(l1) l1.rotation.x=-1.7*s; a0.rotation.z=0.5*s; a1.rotation.z=-0.5*s; }
    else if(kind==='block'){ a0.rotation.x=-1.4*s; a1.rotation.x=-0.4*s; }
    else { a0.rotation.set(0,0,0); a1.rotation.set(0,0,0); if(l1)l1.rotation.x=0; }
  };
  const KINDS=['punch','kick','block','punch','kick'];
  return {kind:'taekwondo', cancel:finish, update(dt,t){
    pt+=dt;
    if(phase==='gather'){
      let all=true;
      const kd=korea.moveToward(new THREE.Vector3(center.x, 0, center.z), dt, 1.1); korea.locomote(dt,t);
      if(kd>=0.6) all=false;
      audience.forEach((k,i)=>{ const d=k.moveToward(audPos[i],dt,1.0); k.locomote(dt,t); if(d>=0.7) all=false; });
      if(all || pt>9){ phase='show'; pt=0;
        korea.heading=0; korea.g.rotation.y=0;
        cue.add(0.3, korea, '태권! 시범 시작합니다!');
        team.forEach(tm=>{ tm.g.rotation.y=0; });
      }
    } else if(phase==='show'){
      cue.run(pt);
      /* 시범단: 동시에 같은 품새 */
      if(pt>=nextMove){ moveN++; nextMove=pt+1.5; }
      const u=Math.min(1,(pt-(nextMove-1.5))/1.1);
      const kind=KINDS[moveN%KINDS.length];
      performers.forEach((p,idx)=>{
        p.b.headG && (p.b.headG.rotation.set(0,0,0));
        doPose(p.b, kind, u);
        /* 기합 점프 */
        const jy=Math.abs(Math.sin(pt*3+idx))*0.12;
        if(p.k){ p.k.g.position.set(p.x,jy,center.z); p.k.heading=0; p.k.g.rotation.y=0; p.k.idle(); }
        else { p.b.g.position.set(p.x,jy,center.z-0.3); }
      });
      if(Math.random()<dt*1.2) puff(sparkTex, new THREE.Vector3(center.x+(Math.random()-0.5)*5,1.5,center.z),1,{size:0.5});
      /* 관객: 구경하며 환호 */
      audience.forEach((k,i)=>{ faceKidToward(k, center, dt, 4); k.idle(); k.locomote(dt,t);
        if(Math.random()<dt*0.12) k.say(pick(['멋지다!','와~!','태권도 최고!','대단해!']));
        if(Math.random()<dt*0.4) puff(Math.random()<0.5?heartTex:sparkTex, k.pos.clone().setY(2.2),1,{size:0.4}); });
      if(moveN>0 && Math.random()<dt*0.25) korea.say(pick(['기합!','얍!','태권!']));
      if(pt>26){ phase='end'; pt=0; cue.add(0.2, korea, '시범 끝! 감사합니다!'); }
    } else {
      cue.run(26+pt);
      performers.forEach(p=>doPose(p.b,'rest',0));
      [korea,...audience].forEach(k=>{ k.idle(); k.locomote(dt,t); });
      if(pt>2.4){ finish(); return true; }
    }
    return false;
  }};
}

/* 3) 리노 옆구르기 — 친구들과 모여 함께 옆으로 구르기 */
function makeSideRollEvt(){
  const rino = kids.find(k=>k.name==='리노' && k.state==='play');
  if(!rino) return null;
  const others = shuffle(kids.filter(k=>k.state==='play' && k!==rino && k.moveStyle!=='skate' && k.moveStyle!=='hop')).slice(0,3);
  if(others.length < 1) return null;
  const members=[rino,...others];
  const startX=-9, endX=9, z0=14;
  members.forEach((k,i)=>{ k.state='event'; k.gotoTarget=null; k.celebT=0; k.startleT=0; k.walkAmt=0;
    k._rollZ = z0 + (i-(members.length-1)/2)*2.6; });
  let phase='gather', pt=0, dir=1, cleaned=false, said=false, laps=0;
  const finish=()=>{ if(cleaned)return; cleaned=true;
    members.forEach(k=>{ k.g.rotation.set(0,0,0); }); release(members); };
  return {kind:'sideRoll', cancel:finish, update(dt,t){
    pt+=dt;
    if(phase==='gather'){
      let all=true;
      members.forEach(k=>{ const d=k.moveToward(new THREE.Vector3(startX,0,k._rollZ),dt,1.0); k.locomote(dt,t); if(d>=0.5) all=false; });
      if(all || pt>9){ phase='roll'; pt=0; members.forEach(k=>{ k.g.position.x=startX; k.heading=0; k.g.rotation.y=0; });
        if(!said){said=true; rino.say('다같이 옆으로 굴러~!');} }
    } else if(phase==='roll'){
      let done=true;
      members.forEach((k,i)=>{
        const targetX = dir>0?endX:startX;
        const nx = k.g.position.x + dir*dt*3.4;
        k.g.position.x = dir>0?Math.min(targetX,nx):Math.max(targetX,nx);
        k.g.position.z = k._rollZ;
        k.g.rotation.z -= dir*dt*5.5; /* 옆구르기 회전 */
        k.g.rotation.y = 0;
        k.g.position.y = 0.45 + Math.abs(Math.sin(k.g.rotation.z*1.0))*0.12;
        k.walkAmt=0;
        if(Math.random()<dt*0.5) puff(sparkTex, k.pos.clone().setY(0.4),1,{size:0.32});
        if((dir>0 && k.g.position.x<targetX) || (dir<0 && k.g.position.x>targetX)) done=false;
      });
      if(done){
        dir*=-1; pt=0;
        if(Math.random()<0.8) members[Math.floor(Math.random()*members.length)].say(pick(['데굴데굴~','어지러워!','또 가자!','구르기 최고!']));
        members.forEach(k=>{ k.g.rotation.z = Math.round(k.g.rotation.z/(Math.PI*2))*(Math.PI*2); });
        laps++;
        if(laps>=3){ phase='end'; pt=0; }
      }
    } else {
      members.forEach(k=>{ k.g.rotation.z*=Math.max(0,1-dt*5); k.g.position.y=Math.max(0,k.g.position.y-dt*1.5); k.idle(); k.locomote(dt,t); });
      if(pt>2){ finish(); return true; }
    }
    return false;
  }};
}

/* 4) 사랑이 큰 트램펄린 — 3배로 커지며 친구들과 함께 */
function makeBigTrampolineEvt(){
  const sarang = kids.find(k=>k.name==='사랑이' && k.state==='play');
  if(!sarang) return null;
  const others = shuffle(kids.filter(k=>k.state==='play' && k!==sarang && k.moveStyle!=='skate')).slice(0,4);
  const members=[sarang,...others];
  const tc = tramp.position; /* (-36,0,12) */
  members.forEach((k,i)=>{ k.state='event'; k.gotoTarget=null; k.celebT=0; k.startleT=0; k.walkAmt=0;
    k._tAng = i/members.length*Math.PI*2; k._tPhase=Math.random()*Math.PI*2; });
  let phase='gather', pt=0, cleaned=false, said=false;
  const baseScale=tramp.scale.x;
  const finish=()=>{ if(cleaned)return; cleaned=true; tramp.scale.setScalar(baseScale);
    members.forEach(k=>{ const bs=k.scale||1; k.g.scale.set(bs,bs,bs); }); release(members); };
  const matTopAt = sc => 1.2*sc; /* 트램펄린 표면 높이 */
  return {kind:'bigTramp', cancel:finish, update(dt,t){
    pt+=dt;
    if(phase==='gather'){
      const sc = THREE.MathUtils.lerp(baseScale, 3, Math.min(1,pt/2.2));
      tramp.scale.setScalar(sc);
      let all=true;
      members.forEach((k,i)=>{ const r=5.5;
        const tgt=new THREE.Vector3(tc.x+Math.cos(k._tAng)*r, 0, tc.z+Math.sin(k._tAng)*r);
        const d=k.moveToward(tgt,dt,1.0); k.locomote(dt,t); if(d>=0.7) all=false; });
      if((all && pt>2.2) || pt>10){ phase='bounce'; pt=0; if(!said){said=true; sarang.say('다같이 콩콩 뛰자~!');} }
    } else if(phase==='bounce'){
      tramp.scale.setScalar(3);
      const top=matTopAt(3), r=5.0;
      members.forEach((k,i)=>{
        k.g.position.x = tc.x+Math.cos(k._tAng)*r;
        k.g.position.z = tc.z+Math.sin(k._tAng)*r;
        const h=Math.abs(Math.sin(t*2.0 + k._tPhase))*2.6;
        k.g.position.y = top + h;
        const sq=1+Math.cos(t*4.0+k._tPhase)*0.08;
        const bs=k.scale||1; k.g.scale.set(bs*(2-sq), bs*sq, bs*(2-sq));
        faceKidToward(k, tc, dt, 2); k.walkAmt=0;
        if(h>2.2 && Math.random()<dt*2.5) puff(Math.random()<0.5?heartTex:sparkTex, k.pos.clone().setY(k.pos.y+1),1,{size:0.5});
        if(Math.random()<dt*0.1) k.say(pick(['콩콩!','더 높이!','야호~','신난다!']));
      });
      if(pt>22){ phase='shrink'; pt=0; }
    } else if(phase==='shrink'){
      const sc=THREE.MathUtils.lerp(3, baseScale, Math.min(1,pt/1.6));
      tramp.scale.setScalar(sc);
      members.forEach(k=>{ const bs=k.scale||1; k.g.scale.set(bs,bs,bs);
        k.g.position.y=Math.max(0,k.g.position.y-dt*4); k.idle(); k.locomote(dt,t); });
      if(pt>1.6){ finish(); return true; }
    }
    return false;
  }};
}

/* 5) 코돌이 딸기 수확 -> 친구들에게 하나씩 나눠주기 */
function makeStrawberryShareEvt(){
  const kodol = kids.find(k=>k.name==='코돌이' && k.state==='play');
  if(!kodol) return null;
  const friends = shuffle(kids.filter(k=>k.state==='play' && k!==kodol)).slice(0,5);
  if(friends.length < 1) return null;
  const berryPos = new THREE.Vector3(berry.position.x+3, 0, berry.position.z);
  const gatherCenter = new THREE.Vector3(-30,0,2);
  friends.forEach((k,i)=>{ k._stPos = new THREE.Vector3(gatherCenter.x + (i-(friends.length-1)/2)*3.0, 0, gatherCenter.z); });
  [kodol,...friends].forEach(k=>{ k.state='event'; k.gotoTarget=null; k.celebT=0; k.startleT=0; k.walkAmt=0; });
  const carried = makeStrawberryMesh(); carried.visible=false; scene.add(carried);
  const given = [];
  let phase='toBerry', pt=0, idx=0, cleaned=false, picked=false;
  const finish=()=>{ if(cleaned)return; cleaned=true;
    scene.remove(carried);
    given.forEach(s=>scene.remove(s));
    if(kodol.b.arms?.[1]) kodol.b.arms[1].rotation.set(0,0,0);
    release([kodol,...friends]); };
  return {kind:'strawberry', cancel:finish, update(dt,t){
    pt+=dt;
    /* 친구들은 줄 서서 기다리며 구경 */
    friends.forEach((k)=>{ const d=k.moveToward(k._stPos,dt,0.95); if(d<0.5) faceKidToward(k, kodol.pos, dt, 3); k.locomote(dt,t); });
    if(phase==='toBerry'){
      const d=kodol.moveToward(berryPos,dt,1.0); kodol.locomote(dt,t);
      if(d<0.6){ phase='harvest'; pt=0; kodol.say('딸기 수확할게!'); }
    } else if(phase==='harvest'){
      kodol.idle(); kodol.locomote(dt,t);
      faceKidToward(kodol, berry.position, dt);
      kodol.b.arms[1].rotation.x = -1.0 + Math.sin(t*5)*0.6; /* 따는 동작 */
      kodol.b.headG.rotation.x = Math.sin(t*5)*0.12;
      if(Math.random()<dt*1.5) puff(heartTex, kodol.pos.clone().setY(1.6),1,{size:0.4});
      if(pt>3.2){ phase='give'; pt=0; idx=0; picked=false; kodol.b.headG.rotation.x=0; carried.visible=true; }
    } else if(phase==='give'){
      if(idx>=friends.length){ phase='done'; pt=0; kodol.say('맛있게 먹어~!'); return false; }
      const f=friends[idx];
      /* 딸기를 들고 친구에게 */
      const handW = kodol.pos.clone().setY(1.5).add(new THREE.Vector3(Math.sin(kodol.heading)*0.6,0,Math.cos(kodol.heading)*0.6));
      carried.position.copy(handW);
      kodol.b.arms[1].rotation.x = -0.8;
      const d=kodol.moveToward(f.pos.clone().add(new THREE.Vector3(0,0,0)), dt, 1.0);
      kodol.locomote(dt,t);
      faceKidToward(kodol, f.pos, dt);
      if(d < 2.4){
        /* 전달 */
        const straw = makeStrawberryMesh();
        straw.position.copy(f.pos).setY(1.4); scene.add(straw); given.push(straw);
        puff(heartTex, f.pos.clone().setY(1.8), 3, {size:0.45});
        if(Math.random()<0.7){ kodol.say('딸기 줄게!'); }
        f.say(pick(['고마워!','잘 먹을게!','딸기다, 야호!','맛있겠다!']));
        idx++; pt=0;
      }
    } else if(phase==='done'){
      carried.visible=false;
      kodol.idle(); kodol.locomote(dt,t);
      if(kodol.b.arms?.[1]) kodol.b.arms[1].rotation.x*=Math.max(0,1-dt*4);
      /* 친구들 먹는 시늉 */
      given.forEach((s,i)=>{ s.position.y = 1.4 + Math.sin(t*4+i)*0.1; });
      if(pt>3){ finish(); return true; }
    }
    return false;
  }};
}

const EVENT_MAKERS = {
  race:makeRace, dance:makeDance, chat:makeChat, swing:makeSwingEvt,
  slide:makeSlideEvt, monkey:makeMonkeyClimbEvt, math:makeMathGuestEvt,
  catBall:makeCatBallEvt, sudalChalk:makeSudalChalkEvt,
  soccer:makeSoccerEvt,
  ddakji:makeDdakjiEvt, taekwondo:makeTaekwondoEvt, sideRoll:makeSideRollEvt,
  bigTramp:makeBigTrampolineEvt, strawberry:makeStrawberryShareEvt
};
const RANDOM_EVENT_KEYS = ['race','dance','chat','swing','slide','ddakji','sideRoll','bigTramp','strawberry','taekwondo','race','ddakji'];
const AUTO_MONKEY_MIN_SECONDS = 540;
const AUTO_MONKEY_JITTER_SECONDS = 120;
function nextAutoMonkeyDelay(){ return AUTO_MONKEY_MIN_SECONDS + Math.random()*AUTO_MONKEY_JITTER_SECONDS; }
let autoMonkeyTimer = nextAutoMonkeyDelay();
function resetAutoMonkeyTimer(){ autoMonkeyTimer = nextAutoMonkeyDelay(); }
function tryStartScheduledMonkeyClimb(){
  if(autoMonkeyTimer > 0) return null;
  const ev = tryStartEvent('monkey');
  if(!ev) autoMonkeyTimer = 60;
  return ev;
}
let evt = null;
let skyEvt = null;
let evtTimer = 14 + Math.random()*8;
let padakFlyEvt = null;
let padakFlyTimer = 2700 + Math.random()*1800; /* 약 45~75분 간격 */
function tryStartEvent(name){
  const key = name ?? pick(RANDOM_EVENT_KEYS);
  const maker = EVENT_MAKERS[key];
  if(!maker) return null;
  const ev = limitEventDuration(maker());
  if(ev && key === 'monkey') resetAutoMonkeyTimer();
  return ev;
}
function prepareManualEventStart(){
  swingState.rider = null;
  kids.forEach(k=>{
    if(k.state === 'event' || k.state === 'return'){
      resetEventPose(k);
      k.state = 'play';
      k.playT = 0;
    }
  });
}
function replaceMainEvent(factory){
  if(evt){
    evt.cancel?.({manualSwitch:true});
    evt = null;
  }
  prepareManualEventStart();
  const next = factory();
  if(!next) return false;
  evt = next;
  evtTimer = 34 + Math.random()*26;
  return true;
}
function replaceSkyEvent(factory){
  if(skyEvt){
    skyEvt.cancel?.({manualSwitch:true});
    skyEvt = null;
  }
  const next = factory();
  if(!next) return false;
  skyEvt = next;
  return true;
}

/* ---------------- main loop ---------------- */
const clock2 = new THREE.Clock();
window.__ow = {
  kids, camera, controls,
  resetCamera:()=>flyCamera(DEFAULT_CAMERA_POSITION, DEFAULT_CAMERA_TARGET, 1.0),
  forceEvent:(n)=>replaceMainEvent(()=>tryStartEvent(n)),
  forceMathGuest:(n)=>replaceMainEvent(()=>limitEventDuration(makeMathGuestEvt(n))),
  forceCatBall:()=>replaceMainEvent(()=>limitEventDuration(makeCatBallEvt())),
  forceSoccer:()=>replaceMainEvent(()=>limitEventDuration(makeSoccerEvt())),
  forceSudalChalk:()=>replaceMainEvent(()=>limitEventDuration(makeSudalChalkEvt())),
  forceDroneNyang:()=>replaceSkyEvent(()=>limitEventDuration(makeDroneNyangEvt(), MAX_EVENT_SECONDS, false)),
  forcePadakFly:()=>{ if(padakFlyEvt) return false; if(padak.state!=='play') return false; padakFlyEvt = makePadakFlyEvt(); return !!padakFlyEvt; },
  getAutoMonkeySeconds:()=>Math.max(0, Math.round(autoMonkeyTimer)),
  getMemoState:()=>({
    open:!memoPanel.hidden,
    date:memoCurrentDate,
    tab:memoActiveTab,
    fontSize:Number(memoFontSizeInput.value),
    textLength:memoText.value.length
  }),
  getEvt:()=>evt,
  getSkyEvt:()=>skyEvt,
  getSudalChalkState:()=>sudalChalkState(),
  getPlans:()=>({
    math:getDailyPlan('mathGuest', 9, 12, MATH_GUESTS.map(g=>g.id)),
    drone:getDailyPlan('droneNyang', 8, 12),
    cat:getDailyPlan('catBall', 8, 12),
    sudalChalkNextAt:getSudalChalkNextAt(),
    autoMonkeySeconds:Math.max(0, Math.round(autoMonkeyTimer))
  })
};
[
  ['달리기','race'], ['강강술래','dance'], ['수다','chat'], ['그네','swing'],
  ['미끄럼틀','slide'], ['딱지치기','ddakji'], ['태권도 시범','taekwondo'], ['옆구르기','sideRoll'],
  ['큰 트램펄린','bigTramp'], ['딸기 나눔','strawberry'], ['뭉키 나무','monkey'], ['알라코 수학','math:alaco'],
  ['코기코 수학','math:cogico'], ['수학 랜덤','math'], ['고양이 공놀이','catBall'],
  ['밤이 축구','soccer'], ['수달이 낙서','sudalChalk']
].forEach(([label, name])=>{
  const b = document.createElement('button');
  b.type = 'button';
  b.textContent = label;
  b.onclick = ()=>{
    if(name === 'math:alaco') window.__ow.forceMathGuest('alaco');
    else if(name === 'math:cogico') window.__ow.forceMathGuest('cogico');
    else if(name === 'math') window.__ow.forceMathGuest();
    else if(name === 'catBall') window.__ow.forceCatBall();
    else if(name === 'soccer') window.__ow.forceSoccer();
    else if(name === 'sudalChalk') window.__ow.forceSudalChalk();
    else window.__ow.forceEvent(name);
  };
  eventButtonsEl.appendChild(b);
});
const droneBtn = document.createElement('button');
droneBtn.type = 'button';
droneBtn.textContent = '드론냥이';
droneBtn.onclick = ()=>window.__ow.forceDroneNyang();
eventButtonsEl.appendChild(droneBtn);
const padakFlyBtn = document.createElement('button');
padakFlyBtn.type = 'button';
padakFlyBtn.textContent = '파닥이 비행';
padakFlyBtn.onclick = ()=>window.__ow.forcePadakFly();
eventButtonsEl.appendChild(padakFlyBtn);
const resetBtn = document.createElement('button');
resetBtn.type = 'button';
resetBtn.textContent = '기본구도';
resetBtn.onclick = ()=>window.__ow.resetCamera();
eventButtonsEl.appendChild(resetBtn);
function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock2.getDelta(), 0.05);
  const t = clock2.elapsedTime;

  for(const k of kids) k.update(dt, t);

  /* 평상시 코돌이↔이송미 술래잡기도 너무 붙지 않게 */
  if(songmi && kodolKid && songmi.state==='play' && kodolKid.state==='play'
     && songmi._tagWithKodol && songmi._tagWithKodol.until > t){
    enforceMinGap(kodolKid, songmi);
  }

  /* 오전 하늘 이벤트 */
  if(skyEvt){
    if(skyEvt.update(dt, t)) skyEvt = null;
  } else {
    skyEvt = tryStartScheduledDroneEvent();
  }

  /* 이벤트 진행/예약 */
  if(evt){
    if(evt.update(dt, t)){ evt = null; evtTimer = 34 + Math.random()*26; }
  } else {
    autoMonkeyTimer -= dt;
    const scheduled = tryStartScheduledSudalChalk() || tryStartScheduledCatBallEvent() || tryStartScheduledMathEvent() || tryStartScheduledSoccer() || tryStartScheduledMonkeyClimb();
    if(scheduled){
      evt = scheduled;
      evtTimer = 34 + Math.random()*26;
    } else {
      evtTimer -= dt;
      if(evtTimer <= 0){
        evt = tryStartEvent();
        if(!evt) evtTimer = 10;
      }
    }
  }
  updateSudalChalkFade(dt);

  /* 파닥이 하늘 날기 */
  if(padakFlyEvt){
    if(padakFlyEvt.update(dt, t)) padakFlyEvt = null;
  } else {
    padakFlyTimer -= dt;
    if(padakFlyTimer <= 0){
      if(padak.state === 'play') padakFlyEvt = makePadakFlyEvt();
      padakFlyTimer = 2700 + Math.random()*1800;
    }
  }

  /* 그네 흔들림 */
  swingState.amp += ((swingState.rider?0.55:0) - swingState.amp) * Math.min(1, dt*0.5);
  swingPivot.rotation.x = Math.sin(t*1.35) * swingState.amp;

  /* 파닥이 별친구 */
  const star = padak.b.buddy;
  tmpV.copy(padak.pos).add(new THREE.Vector3(Math.sin(padak.heading-2.2)*1.5,0,Math.cos(padak.heading-2.2)*1.5));
  star.position.lerp(tmpV, Math.min(1,dt*3));
  star.position.y = 0.2+Math.abs(Math.sin(t*3))*0.3;
  star.rotation.y += dt;

  /* 공 물리 + 아이들이 지나가며 톡 차기 (축구 이벤트 중에는 이벤트가 공을 제어) */
  if(!ballOwnedByEvent){
    ball.position.addScaledVector(ballVel, dt);
    ballVel.multiplyScalar(Math.max(0, 1-dt*1.2));
    ball.rotation.x += ballVel.z*dt*2; ball.rotation.z -= ballVel.x*dt*2;
    if(Math.abs(ball.position.x) > 24){ ball.position.x=Math.sign(ball.position.x)*24; ballVel.x*=-0.8; }
    if(ball.position.z < -14 || ball.position.z > 8){
      ball.position.z = THREE.MathUtils.clamp(ball.position.z,-14,8); ballVel.z*=-0.8; }
    for(const k of kids){
      if(k.name==='밤이') continue;
      if(k.pos.distanceTo(ball.position) < 0.95 && ballVel.length() < 0.5){
        tmpV.subVectors(ball.position, k.pos).setY(0).normalize();
        ballVel.addScaledVector(tmpV, 2.2);
        puff(sparkTex, ball.position.clone().setY(0.8), 1, {size:0.4});
      }
    }
  }

  /* 나비 */
  for(const bf of butterflies){
    const p = t*0.32 + bf.ph;
    bf.g.position.set(bf.cx + Math.sin(p)*bf.r, 1.1+Math.sin(t*1.6+bf.ph)*0.45, bf.cz + Math.cos(p*0.8)*bf.r*0.8);
    bf.g.rotation.y = Math.atan2(Math.cos(p)*bf.r*0.32, -Math.sin(p*0.8)*bf.r*0.26);
    const flap = 0.5 + Math.sin(t*11+bf.ph)*0.55;
    bf.wl.rotation.y = flap; bf.wr.rotation.y = -flap;
  }

  /* 깃발 펄럭 */
  flag.rotation.y = Math.sin(t*2.2)*0.16;
  flag.position.x = 2.35 + Math.sin(t*2.2)*0.1;

  for(const c of clouds){ c.position.x += dt*1.1; if(c.position.x > 110) c.position.x = -110; }

  for(let i=ripples.length-1;i>=0;i--){
    const r = ripples[i]; r.t += dt;
    const s = 1 + r.t*6;
    r.m.scale.set(s,s,1);
    r.m.material.opacity = 1-r.t/0.8; r.m.material.transparent = true;
    if(r.t>0.8){ scene.remove(r.m); ripples.splice(i,1); }
  }

  updateParticles(dt);

  if(camAnim){
    camAnim.t += dt;
    const u = Math.min(1, camAnim.t/camAnim.dur);
    const e = u<0.5 ? 2*u*u : 1-Math.pow(-2*u+2,2)/2;
    camera.position.lerpVectors(camAnim.fromP, camAnim.toP, e);
    controls.target.lerpVectors(camAnim.fromT, camAnim.toT, e);
    if(u>=1) camAnim=null;
  }
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
