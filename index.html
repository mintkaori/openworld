<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3학년 2반 캐릭터 오픈월드 학교</title>
<link rel="icon" href="data:,">
<style>
  html,body{margin:0;padding:0;overflow:hidden;height:100%;background:#9fd9ff;font-family:'Segoe UI','Malgun Gothic',sans-serif;}
  #app{position:fixed;inset:0;}
  .panel{position:fixed;z-index:10;background:rgba(255,255,255,.82);border:2px solid #ffd9a0;
    border-radius:14px;padding:10px 14px;box-shadow:0 4px 14px rgba(80,60,20,.18);}
  #title{top:12px;left:12px;max-width:340px;display:none;}
  #title h1{margin:0 0 4px;font-size:17px;color:#8a5a2b;}
  #title p{margin:2px 0;font-size:12px;color:#6b5a3e;line-height:1.5;}
  #title b{color:#d2691e;}
  .event-buttons{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px;margin-top:8px;}
  .event-buttons button{border:1px solid rgba(138,90,43,.35);border-radius:8px;background:#fffaf0;color:#76502b;
    font-weight:800;font-size:12px;padding:6px 8px;cursor:pointer;box-shadow:0 1px 4px rgba(80,60,20,.12);}
  .event-buttons button:hover{background:#fff1cf;}
  #chips{position:fixed;z-index:1000;left:50%;transform:translateX(-50%);bottom:86px;display:flex;
    flex-wrap:wrap;gap:7px;justify-content:center;max-width:min(980px,88vw);padding:8px 10px;
    border:2px solid rgba(255,217,160,.88);border-radius:16px;background:rgba(255,255,255,.72);
    box-shadow:0 10px 28px rgba(40,35,20,.24);backdrop-filter:blur(4px);}
  .chip{border:2px solid rgba(120,80,30,.32);border-radius:999px;padding:6px 13px;font-size:14px;
    font-weight:800;cursor:pointer;box-shadow:0 3px 8px rgba(60,40,10,.25);transition:transform .12s;}
  .chip:hover{transform:translateY(-3px) scale(1.06);}
  #err{position:fixed;z-index:99;bottom:8px;left:8px;max-width:90vw;background:#fff0f0;color:#b00;
    font-size:12px;padding:6px 10px;border-radius:8px;display:none;white-space:pre-wrap;}
  #toggleHelp{position:fixed;z-index:11;top:12px;right:12px;width:34px;height:34px;border-radius:50%;
    border:2px solid #ffd9a0;background:rgba(255,255,255,.85);font-size:18px;cursor:pointer;}
  #labelToggle{position:fixed;z-index:11;top:12px;right:54px;height:34px;display:flex;align-items:center;gap:6px;
    border:2px solid #ffd9a0;border-radius:999px;background:rgba(255,255,255,.85);padding:0 10px;
    color:#76502b;font-weight:800;font-size:13px;box-shadow:0 2px 8px rgba(80,60,20,.14);user-select:none;}
  #labelToggle input{width:15px;height:15px;accent-color:#f06fa0;}
  #memoToggle{position:fixed;z-index:12;top:54px;right:12px;width:34px;height:34px;border-radius:50%;
    border:2px solid #d9c58c;background:rgba(39,83,62,.92);color:#fff7d6;font-size:20px;font-weight:900;
    cursor:pointer;box-shadow:0 3px 10px rgba(30,40,20,.25);}
  #memoPanel{position:fixed;z-index:1001;top:96px;right:18px;width:min(520px,calc(100vw - 36px));
    max-height:calc(100vh - 122px);display:flex;flex-direction:column;gap:10px;padding:14px;
    border:8px solid #9a6b3d;border-radius:10px;background:#23553f;color:#f7f1d0;
    box-shadow:inset 0 0 0 2px rgba(255,255,255,.12),0 18px 40px rgba(20,20,10,.35);}
  #memoPanel[hidden]{display:none;}
  .memo-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .memo-title{font-weight:900;font-size:18px;margin-right:auto;text-shadow:0 1px 0 rgba(0,0,0,.35);}
  #memoDate,#memoFontSize{height:32px;border:1px solid rgba(255,255,255,.35);border-radius:6px;
    background:#f7f1d0;color:#214b38;font-weight:800;padding:0 8px;}
  #memoFontRange{width:110px;accent-color:#f7d36a;}
  #memoClose{width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,.35);
    background:rgba(255,255,255,.14);color:#fff7d6;font-size:20px;font-weight:900;cursor:pointer;}
  .memo-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .memo-tabs button{height:38px;border:2px solid rgba(255,255,255,.35);border-radius:7px;
    background:rgba(255,255,255,.1);color:#f7f1d0;font-size:16px;font-weight:900;cursor:pointer;}
  .memo-tabs button.active{background:#f7f1d0;color:#23553f;border-color:#f7d36a;}
  #memoText{min-height:480px;max-height:calc(100vh - 250px);resize:vertical;padding:16px;
    border:2px dashed rgba(255,255,255,.38);border-radius:8px;background:rgba(8,41,29,.52);
    color:#fffbe8;font-family:'Malgun Gothic','Segoe UI',sans-serif;font-size:50px;line-height:1.4;
    font-weight:700;outline:none;box-shadow:inset 0 0 22px rgba(0,0,0,.16);}
  #memoText::placeholder{color:rgba(255,251,232,.5);}
  .memo-status{font-size:12px;color:rgba(255,251,232,.78);text-align:right;}
</style>

<body>
<div id="app"></div>
<div class="panel" id="title">
  <h1>🏫 3학년 2반 캐릭터 오픈월드</h1>
  <p>우리 반 친구들이 만든 캐릭터 11명이 학교에서 놀고 있어요!</p>
  <p>🎪 가끔씩 친구들이 모여 <b>달리기 시합·강강술래·수다·그네·미끄럼틀</b>을 즐겨요</p>
  <p>👆 <b>캐릭터 클릭</b> = 인사 · <b>바닥 클릭</b> = 모여라!</p>
  <p>⚡ <b>더블클릭</b> = 깜짝!! · 드래그 = 카메라 · 휠 = 줌(마우스 방향)</p>
  <div id="eventButtons" class="event-buttons" hidden></div>
</div>
<button id="toggleHelp" title="설명 켜기/끄기">?</button>
<label id="labelToggle" title="캐릭터 이름표 표시">
  <input id="labelToggleInput" type="checkbox"> 이름표
</label>
<button id="memoToggle" title="메모장">!</button>
<section id="memoPanel" hidden>
  <div class="memo-top">
    <div class="memo-title">3-2 메모장</div>
    <input id="memoDate" type="date" aria-label="메모 날짜">
    <input id="memoFontRange" type="range" min="22" max="100" step="1" aria-label="글자 크기">
    <input id="memoFontSize" type="number" min="22" max="100" step="1" aria-label="글자 크기 숫자">
    <button id="memoClose" type="button" title="닫기">×</button>
  </div>
  <div class="memo-tabs">
    <button id="memoTabMorning" type="button" class="active">아침활동</button>
    <button id="memoTabNotice" type="button">알림장</button>
  </div>
  <textarea id="memoText" spellcheck="false" placeholder="오늘 날짜의 내용을 적어두세요."></textarea>
  <div id="memoStatus" class="memo-status">로컬 저장 준비</div>
</section>
<div id="chips"></div>
<div id="err"></div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { clone as cloneSkinned } from 'three/addons/utils/SkeletonUtils.js';

const errBox = document.getElementById('err');
window.addEventListener('error', e=>{ errBox.style.display='block'; errBox.textContent='오류: '+e.message; });
const titlePanel = document.getElementById('title');
const eventButtonsEl = document.getElementById('eventButtons');
const labelToggleInput = document.getElementById('labelToggleInput');
const memoToggle = document.getElementById('memoToggle');
const memoPanel = document.getElementById('memoPanel');
const memoClose = document.getElementById('memoClose');
const memoDateInput = document.getElementById('memoDate');
const memoFontRange = document.getElementById('memoFontRange');
const memoFontSizeInput = document.getElementById('memoFontSize');
const memoTabMorning = document.getElementById('memoTabMorning');
const memoTabNotice = document.getElementById('memoTabNotice');
const memoText = document.getElementById('memoText');
const memoStatus = document.getElementById('memoStatus');
let characterLabelsVisible = false;
let eventButtonsUnlocked = false;
let helpTapCount = 0;
let lastHelpTapAt = 0;
let memoActiveTab = 'morning';
let memoCurrentDate = memoDateKey();
let memoSaveTimer = null;
function setTitlePanelVisible(visible){
  titlePanel.style.display = visible ? 'block' : 'none';
}
function isTitlePanelVisible(){
  return getComputedStyle(titlePanel).display !== 'none';
}
document.getElementById('toggleHelp').onclick = ()=>{
  const now = performance.now();
  if(now - lastHelpTapAt > 1600) helpTapCount = 0;
  lastHelpTapAt = now;
  helpTapCount += 1;
  if(helpTapCount >= 4){
    eventButtonsUnlocked = true;
    setTitlePanelVisible(true);
    eventButtonsEl.hidden = false;
    return;
  }
  setTitlePanelVisible(!isTitlePanelVisible());
  eventButtonsEl.hidden = !eventButtonsUnlocked;
};
labelToggleInput.checked = characterLabelsVisible;
labelToggleInput.onchange = ()=>setCharacterLabelsVisible(labelToggleInput.checked);
function memoDateKey(now=new Date()){
  const p = n => String(n).padStart(2,'0');
  return `${now.getFullYear()}-${p(now.getMonth()+1)}-${p(now.getDate())}`;
}
function memoStorageKey(date){ return `openworld.memo.${date}`; }
function readMemo(date=memoCurrentDate){
  try{
    return JSON.parse(localStorage.getItem(memoStorageKey(date)) || 'null') ||
      {morning:'', notice:'', updatedAt:null};
  }catch{
    return {morning:'', notice:'', updatedAt:null};
  }
}
function writeMemo(date=memoCurrentDate){
  const data = readMemo(date);
  data[memoActiveTab] = memoText.value;
  data.fontSize = Number(memoFontSizeInput.value) || 50;
  data.updatedAt = new Date().toISOString();
  try{
    localStorage.setItem(memoStorageKey(date), JSON.stringify(data));
    localStorage.setItem('openworld.memo.fontSize', String(data.fontSize));
    memoStatus.textContent = '저장됨';
  }catch{
    memoStatus.textContent = '저장 실패';
  }
}
function queueMemoSave(){
  memoStatus.textContent = '저장 중...';
  clearTimeout(memoSaveTimer);
  memoSaveTimer = setTimeout(writeMemo, 180);
}
function setMemoFontSize(size, save=true){
  const next = THREE.MathUtils?.clamp ? THREE.MathUtils.clamp(Number(size)||50, 22, 100) :
    Math.min(100, Math.max(22, Number(size)||50));
  memoText.style.fontSize = `${next}px`;
  memoFontRange.value = String(next);
  memoFontSizeInput.value = String(next);
  if(save) queueMemoSave();
}
function loadMemoTab(tab=memoActiveTab){
  memoActiveTab = tab;
  memoTabMorning.classList.toggle('active', tab === 'morning');
  memoTabNotice.classList.toggle('active', tab === 'notice');
  const data = readMemo();
  memoText.value = data[tab] || '';
  setMemoFontSize(data.fontSize || Number(localStorage.getItem('openworld.memo.fontSize')) || 50, false);
  memoStatus.textContent = data.updatedAt ? '로컬 저장됨' : '새 메모';
}
memoDateInput.value = memoCurrentDate;
memoToggle.onclick = ()=>{
  memoPanel.hidden = !memoPanel.hidden;
  if(!memoPanel.hidden){ loadMemoTab(memoActiveTab); memoText.focus(); }
};
memoClose.onclick = ()=>{ writeMemo(); memoPanel.hidden = true; };
memoDateInput.onchange = ()=>{
  writeMemo();
  memoCurrentDate = memoDateInput.value || memoDateKey();
  loadMemoTab(memoActiveTab);
};
memoTabMorning.onclick = ()=>{ writeMemo(); loadMemoTab('morning'); };
memoTabNotice.onclick = ()=>{ writeMemo(); loadMemoTab('notice'); };
memoText.oninput = queueMemoSave;
memoFontRange.oninput = ()=>setMemoFontSize(memoFontRange.value);
memoFontSizeInput.onchange = ()=>setMemoFontSize(memoFontSizeInput.value);
setMemoFontSize(Number(localStorage.getItem('openworld.memo.fontSize')) || 50, false);

/* ---------------- renderer / scene ---------------- */
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.getElementById('app').appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xa8ddff);
scene.fog = new THREE.Fog(0xd6efff, 110, 260);

const DEFAULT_CAMERA_POSITION = new THREE.Vector3(0, 41.5, 75);
const DEFAULT_CAMERA_TARGET = new THREE.Vector3(0, 1, -3);
const camera = new THREE.PerspectiveCamera(48, innerWidth/innerHeight, 0.1, 600);
camera.position.copy(DEFAULT_CAMERA_POSITION); /* QHD(16:9) 기준 전 구역이 보이는 최적 지점 */

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.copy(DEFAULT_CAMERA_TARGET);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI*0.49;
controls.minDistance = 6;
controls.maxDistance = 170;
controls.zoomToCursor = true;

const cameraControlZone = {left:0.25, right:0.75, top:0.12, bottom:0.88};
function isCameraControlZone(e){
  const x = e.clientX / Math.max(1, innerWidth);
  const y = e.clientY / Math.max(1, innerHeight);
  return x >= cameraControlZone.left && x <= cameraControlZone.right &&
    y >= cameraControlZone.top && y <= cameraControlZone.bottom;
}
function guardCameraInput(e){
  if(isCameraControlZone(e)) return;
  e.stopImmediatePropagation();
  if(e.type === 'wheel') e.preventDefault();
}
renderer.domElement.addEventListener('pointerdown', guardCameraInput, {capture:true});
renderer.domElement.addEventListener('wheel', guardCameraInput, {capture:true, passive:false});
renderer.domElement.addEventListener('contextmenu', guardCameraInput, {capture:true});

scene.add(new THREE.HemisphereLight(0xeaf4ff, 0xa6c585, 1.25));
const sun = new THREE.DirectionalLight(0xfff3d0, 1.25);
sun.position.set(45, 70, 35);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left=-80; sun.shadow.camera.right=80;
sun.shadow.camera.top=80; sun.shadow.camera.bottom=-80;
sun.shadow.camera.far = 230;
sun.shadow.bias = -0.0004;
scene.add(sun);

addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* ---------------- toon material helpers ---------------- */
const gradMap = (()=>{
  const cv = document.createElement('canvas'); cv.width=4; cv.height=1;
  const x = cv.getContext('2d');
  ['#bdbdbd','#dedede','#ffffff','#ffffff'].forEach((c,i)=>{ x.fillStyle=c; x.fillRect(i,0,1,1); });
  const t = new THREE.CanvasTexture(cv);
  t.minFilter = THREE.NearestFilter; t.magFilter = THREE.NearestFilter; t.generateMipmaps = false;
  return t;
})();
const M = (c,o={}) => new THREE.MeshToonMaterial({color:c, gradientMap:gradMap, ...o});
const outlineMat = new THREE.MeshBasicMaterial({color:0x4a3527, side:THREE.BackSide});

function mesh(geo, mat, x=0,y=0,z=0, shadow=true){
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x,y,z);
  m.castShadow = shadow; m.receiveShadow = shadow;
  return m;
}
const sph = (r,c,x,y,z,sx=1,sy=1,sz=1)=>{ const m=mesh(new THREE.SphereGeometry(r,24,18),M(c),x,y,z); m.scale.set(sx,sy,sz); return m; };
const box = (w,h,d,c,x,y,z)=> mesh(new THREE.BoxGeometry(w,h,d),M(c),x,y,z);
const cyl = (rt,rb,h,c,x,y,z,seg=20)=> mesh(new THREE.CylinderGeometry(rt,rb,h,seg),M(c),x,y,z);
const cone = (r,h,c,x,y,z,seg=20)=> mesh(new THREE.ConeGeometry(r,h,seg),M(c),x,y,z);
const cap = (r,l,c,x,y,z)=> mesh(new THREE.CapsuleGeometry(r,l,6,14),M(c),x,y,z);
const torus = (r,t,c,x,y,z,arc=Math.PI*2)=> mesh(new THREE.TorusGeometry(r,t,12,28,arc),M(c),x,y,z);

function starShape(R=1,r=.45,n=5){
  const s = new THREE.Shape();
  for(let i=0;i<n*2;i++){
    const rad = i%2===0?R:r, a = i/(n*2)*Math.PI*2 - Math.PI/2;
    const x=Math.cos(a)*rad, y=Math.sin(a)*rad;
    i===0 ? s.moveTo(x,y) : s.lineTo(x,y);
  }
  s.closePath(); return s;
}
function starMesh(R,depth,c){
  const g = new THREE.ExtrudeGeometry(starShape(R,R*.45), {depth, bevelEnabled:false});
  g.center();
  return mesh(g, M(c));
}

/* 만화풍 윤곽선 */
const _sz = new THREE.Vector3(), _ws = new THREE.Vector3();
function toonify(root){
  const targets=[];
  root.traverse(o=>{
    if(!o.isMesh || o.userData.isOutline || o.isSprite) return;
    if(o.material && o.material.isMeshBasicMaterial) return;
    const g=o.geometry;
    if(g.type==='PlaneGeometry'||g.type==='CircleGeometry') return;
    if(!g.boundingBox) g.computeBoundingBox();
    g.boundingBox.getSize(_sz);
    o.getWorldScale(_ws);
    const minD=Math.min(_sz.x*Math.abs(_ws.x), _sz.y*Math.abs(_ws.y), _sz.z*Math.abs(_ws.z));
    const maxD=Math.max(_sz.x*Math.abs(_ws.x), _sz.y*Math.abs(_ws.y), _sz.z*Math.abs(_ws.z));
    if(minD<0.06 || maxD<0.24) return;
    targets.push({o, maxD});
  });
  for(const {o,maxD} of targets){
    const out=new THREE.Mesh(o.geometry, outlineMat);
    out.userData.isOutline=true;
    out.scale.setScalar(1+THREE.MathUtils.clamp(0.055/maxD, 0.04, 0.33));
    out.castShadow=false; out.receiveShadow=false;
    o.add(out);
  }
}

/* ---------------- canvas/sprite helpers ---------------- */
function canvasTexture(w,h,draw){
  const cv = document.createElement('canvas'); cv.width=w; cv.height=h;
  draw(cv.getContext('2d'), w, h);
  const t = new THREE.CanvasTexture(cv);
  t.anisotropy = 4; t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
function spriteFromCanvas(draw, w, h, worldH){
  const tex = canvasTexture(w,h,draw);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({map:tex, transparent:true, depthWrite:false}));
  sp.scale.set(worldH*w/h, worldH, 1);
  return sp;
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function makeLabel(text, color){
  return spriteFromCanvas((ctx,w,h)=>{
    ctx.font = '700 44px "Malgun Gothic", sans-serif';
    const tw = ctx.measureText(text).width + 44;
    const x=(w-tw)/2;
    ctx.fillStyle='rgba(255,255,255,.88)';
    roundRect(ctx,x,18,tw,72,34); ctx.fill();
    ctx.lineWidth=6; ctx.strokeStyle=color; ctx.stroke();
    ctx.fillStyle='#5a4632'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(text, w/2, 56);
  }, 512,108, 1.0);
}
function makeBubble(text){
  return spriteFromCanvas((ctx,w,h)=>{
    ctx.font='700 52px "Malgun Gothic", sans-serif';
    const tw = Math.min(w-20, ctx.measureText(text).width+60);
    const x=(w-tw)/2;
    ctx.fillStyle='rgba(255,255,255,.96)';
    roundRect(ctx,x,12,tw,96,40); ctx.fill();
    ctx.strokeStyle='#f7a8c4'; ctx.lineWidth=7; ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(w/2-18,104); ctx.lineTo(w/2+20,104); ctx.lineTo(w/2,138); ctx.closePath();
    ctx.fillStyle='rgba(255,255,255,.96)'; ctx.fill();
    ctx.fillStyle='#7a4a2a'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(text, w/2, 62, tw-50);
  }, 1024,144, 1.5);
}
const heartTex = canvasTexture(128,128,(c)=>{
  c.fillStyle='#ff6fa5';
  c.beginPath(); c.moveTo(64,112);
  c.bezierCurveTo(8,72,16,24,52,28); c.bezierCurveTo(60,30,64,40,64,44);
  c.bezierCurveTo(64,40,68,30,76,28); c.bezierCurveTo(112,24,120,72,64,112);
  c.fill();
});
const sparkTex = canvasTexture(128,128,(c)=>{
  c.fillStyle='#ffd84d'; c.translate(64,64); c.beginPath();
  for(let i=0;i<8;i++){ const a=i/8*Math.PI*2, r=i%2?16:56;
    i===0?c.moveTo(Math.cos(a)*r,Math.sin(a)*r):c.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
  c.closePath(); c.fill();
});
const exclTex = canvasTexture(96,128,(c)=>{
  c.fillStyle='#ff5050'; c.font='900 120px sans-serif';
  c.textAlign='center'; c.textBaseline='middle'; c.fillText('!',48,64);
});
const noteTex = canvasTexture(96,128,(c)=>{
  c.fillStyle='#7a6cff'; c.font='900 96px sans-serif';
  c.textAlign='center'; c.textBaseline='middle'; c.fillText('♪',48,64);
});
const qTex = canvasTexture(96,128,(c)=>{
  c.fillStyle='#4f9fd9'; c.font='900 110px sans-serif';
  c.textAlign='center'; c.textBaseline='middle'; c.fillText('?',48,64);
});
const texLoader = new THREE.TextureLoader();
function pngTexture(file){
  const tex = texLoader.load(encodeURI(file));
  tex.colorSpace = THREE.SRGBColorSpace;

const gltfLoader = new GLTFLoader();
function normalizeGuestModel(root, scaleFactor){
  const box = new THREE.Box3().setFromObject(root);
  const center = new THREE.Vector3(); box.getCenter(center);
  const wrap = new THREE.Group();
  root.position.set(-center.x, -box.min.y, -center.z); /* 발을 원점에, 가로 중앙 정렬 */
  wrap.add(root);
  wrap.scale.setScalar(scaleFactor);
  wrap.traverse(o=>{ if(o.isMesh){ o.castShadow = true; o.receiveShadow = true; } });
  return wrap;
}
function loadGuestModel(def){
  if(def.modelLoaded || !def.model) return;
  def.modelLoaded = true;
  gltfLoader.load(encodeURI(def.model), gltf=>{
    def.modelProto = normalizeGuestModel(gltf.scene, def.modelScale);
    def.clips = gltf.animations || [];
  }, undefined, err=>{
    console.warn('GLB load failed', def.model, err);
    def.modelLoaded = false;
  });
}

const GUEST_FACE_YAW = 0; /* 모델 정면(얼굴)이 카메라(+z)를 향하도록 — 절대 등을 보이지 않음 */
function createMathGuest(def){
  const group = new THREE.Group();

  /* 3D 모델 우선, 아직 로딩 전이면 스프라이트로 임시 표시 */
  let body, model = null, mixer = null;
  const guestPos = new THREE.Vector3(-1.5, 0, 2.2); /* 살짝 오른쪽(중앙쪽)으로 이동 */
  const attachModelIfReady = ()=>{
    if(model || !def.modelProto) return false;
    if(body && body.isSprite) group.remove(body);
    model = cloneSkinned(def.modelProto);
    model.userData.baseScale = model.scale.x; /* 정규화 배율 보존(스쿼시는 여기 곱함) */
    model.position.copy(guestPos);
    model.rotation.y = GUEST_FACE_YAW; /* 등장 시 얼굴 정면(카메라 쪽) */
    group.add(model);
    body = model;
    if(def.clips && def.clips.length){
      mixer = new THREE.AnimationMixer(model);
      mixer.clipAction(def.clips[0]).play();
    }
    return true;
  };
  if(!attachModelIfReady()){
    loadGuestModel(def);
    body = imageSprite(def.tex, def.aspect, 13.5);
    body.position.set(guestPos.x, 6.9, 2.2); group.add(body);
  }
  const guestShadow = null; /* 코기코/알라코 밑 원형 그림자 2개 제거(요청) */
  const board = makeMathBoard(def.name, def.color);
  board.position.set(5.3, 5.2, -0.9); group.add(board);
  const label = makeLabel(`${def.name} 수학 선생님`, def.color);
  label.position.set(guestPos.x, 14.0, 2.2); label.scale.multiplyScalar(1.25); group.add(label);
  let bubble = null;
  return {
    group, board, guestShadow, faceYaw:GUEST_FACE_YAW, basePos:guestPos.clone(),
    get body(){ return body; },
    get model(){ return model; },
    update(dt){ attachModelIfReady(); if(mixer) mixer.update(dt); },
    say(text){
      if(bubble){ group.remove(bubble); bubble.material.map.dispose(); bubble.material.dispose(); }
      bubble = makeBubble(text);
      bubble.position.set(guestPos.x+0.8, 17.4, 2.2);
      bubble.scale.multiplyScalar(2.4); /* 말풍선 자체 크기 2배 */
      group.add(bubble);
    },
    clear(){
      if(bubble){ group.remove(bubble); bubble.material.map.dispose(); bubble.material.dispose(); bubble=null; }
    }
  };
}

function tubeBetween(a,b,r,color){
  const dir = new THREE.Vector3().subVectors(b,a);
  const len = dir.length();
  const mid = new THREE.Vector3().addVectors(a,b).multiplyScalar(0.5);
  const m = cyl(r,r,len,color, mid.x,mid.y,mid.z,8);
  if(len > 0.0001) m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize());
  return m;
}
function createCageBall(){
  const group = new THREE.Group();
  const edgeGeo = new THREE.EdgesGeometry(new THREE.IcosahedronGeometry(1.05,2));
  const arr = edgeGeo.attributes.position.array;
  const joints = new Map();
  for(let i=0;i<arr.length;i+=6){
    const a = new THREE.Vector3(arr[i],arr[i+1],arr[i+2]);
    const b = new THREE.Vector3(arr[i+3],arr[i+4],arr[i+5]);
    const col = (i/6)%2 ? 0x2f7fe4 : 0x36b982;
    group.add(tubeBetween(a,b,0.035,col));
    for(const p of [a,b]){
      const key = `${p.x.toFixed(2)},${p.y.toFixed(2)},${p.z.toFixed(2)}`;
      if(!joints.has(key)) joints.set(key, p.clone());
    }
  }
  joints.forEach(p=> group.add(sph(0.07,0xd9f1ff,p.x,p.y,p.z,1,1,1)));
  group.scale.setScalar(0.78);
  return group;
}

const particles = [];
function puff(tex, pos, n=1, opt={}){
  for(let i=0;i<n;i++){
    const sp = new THREE.Sprite(new THREE.SpriteMaterial({map:tex, transparent:true, depthWrite:false}));
    const s = (opt.size||0.7)*(0.7+Math.random()*0.6);
    sp.scale.set(s,s,1);
    sp.position.copy(pos);
    sp.position.x += (Math.random()-0.5)*1.2;
    sp.position.z += (Math.random()-0.5)*1.2;
    scene.add(sp);
    particles.push({sp, t:0, life: opt.life||1.3,
      vel:new THREE.Vector3((Math.random()-.5)*0.8, 1.6+Math.random()*1.2, (Math.random()-.5)*0.8)});
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i]; p.t += dt;
    p.sp.position.addScaledVector(p.vel, dt);
    p.sp.material.opacity = Math.max(0, 1 - p.t/p.life);
    if(p.t>=p.life){ scene.remove(p.sp); p.sp.material.dispose(); particles.splice(i,1); }
  }
}

function drawTaegeukMark(c,cx,cy,R){
  c.save();
  c.translate(cx,cy);
  c.fillStyle='#cd2e3a';
  c.beginPath(); c.arc(0,0,R,Math.PI,0,false); c.fill();
  c.fillStyle='#0047a0';
  c.beginPath(); c.arc(0,0,R,0,Math.PI,false); c.fill();
  c.fillStyle='#cd2e3a';
  c.beginPath(); c.arc(-R/2,0,R/2,0,Math.PI*2); c.fill();
  c.fillStyle='#0047a0';
  c.beginPath(); c.arc(R/2,0,R/2,0,Math.PI*2); c.fill();
  c.restore();
}
function drawTrigram(c,bx,by,unit,rot,broken){
  c.save();
  c.translate(bx,by);
  c.rotate(rot);
  c.fillStyle='#000';
  for(let i=-1;i<=1;i++){
    const y = i*unit*0.32-unit*0.08;
    if(broken.includes(i)){
      c.fillRect(-unit*0.72,y,unit*0.62,unit*0.16);
      c.fillRect(unit*0.1,y,unit*0.62,unit*0.16);
    } else {
      c.fillRect(-unit*0.72,y,unit*1.44,unit*0.16);
    }
  }
  c.restore();
}
function taegeukCanvas(c,w,h){
  c.fillStyle='#ffffff'; c.fillRect(0,0,w,h);
  const cx=w/2, cy=h/2, R=h*0.25;
  drawTaegeukMark(c,cx,cy,R);
  drawTrigram(c,cx-R*1.7, cy-R*0.95, R*0.95, -Math.PI/5.2, []);
  drawTrigram(c,cx+R*1.7, cy-R*0.95, R*0.95,  Math.PI/5.2, [-1,1]);
  drawTrigram(c,cx-R*1.7, cy+R*0.95, R*0.95,  Math.PI/5.2, [0]);
  drawTrigram(c,cx+R*1.7, cy+R*0.95, R*0.95, -Math.PI/5.2, [-1,0,1]);
}
function koreaFaceCanvas(c,w,h){
  /* 태극기 배경처럼 얼굴통 전체를 깨끗한 흰색으로 채움 */
  c.fillStyle='#ffffff'; c.fillRect(0,0,w,h);
  const cx=w/2, cy=h/2, R=w*0.18;
  drawTaegeukMark(c,cx,cy,R);
  drawTrigram(c,cx-R*1.75, cy-R*1.35, R*0.72, -Math.PI/5.2, []);
  drawTrigram(c,cx+R*1.75, cy-R*1.35, R*0.72,  Math.PI/5.2, [-1,1]);
  drawTrigram(c,cx-R*1.75, cy+R*1.35, R*0.72,  Math.PI/5.2, [0]);
  drawTrigram(c,cx+R*1.75, cy+R*1.35, R*0.72, -Math.PI/5.2, [-1,0,1]);
}

function tree(x,z,s=1, big=false){
  const g = new THREE.Group();
  const trunkH = (big?8:4.5) * s;
  const trunkTop = big ? 0.28*s : 0.45*s;
  const trunkBase = big ? 0.42*s : 0.6*s;
  g.add(cyl(trunkTop,trunkBase, trunkH, 0x8a5a33, 0,trunkH/2,0,10));
  const leaf = 0x5fae54;
  if(big){
    const branch = (ax,ay,az,bx,by,bz,r=0.18)=>{
      g.add(tubeBetween(new THREE.Vector3(ax*s,ay*s,az*s), new THREE.Vector3(bx*s,by*s,bz*s), r*s, 0x8a5a33));
    };
    branch(0,4.7,0, -2.35,5.55,0.35,0.13);
    branch(0,5.35,0,  1.95,5.95,-0.55,0.12);
    branch(0,6.1,0, -2.95,6.45,-0.25,0.105);
    branch(0,6.55,0,  2.35,6.95,0.45,0.095);
    branch(-0.25,4.0,0.15, -1.45,4.65,0.9,0.075);
    branch(0.4,4.45,-0.1, 1.45,4.85,-0.9,0.07);
    for(const p of [[-2.35,5.55,0.35],[1.95,5.95,-0.55],[-2.95,6.45,-0.25],[2.35,6.95,0.45]]){
      g.add(sph(0.1*s, 0x8a5a33, p[0]*s, p[1]*s, p[2]*s, 1,1,1));
    }
  } else {
    g.add(sph(2.1*s,leaf, 0,5*s,0)); g.add(sph(1.5*s,0x6fc063, 1.4*s,4.2*s,0.4));
    g.add(sph(1.4*s,0x7ccd6f, -1.3*s,4.1*s,-0.3));
  }
  g.position.set(x,0,z); scene.add(g); return g;
}

function biped(o){
  const g = new THREE.Group();
  const legH = o.legH ?? 0.42, bodyH = o.bodyH ?? 0.62, bodyR = o.bodyR ?? 0.4;
  const headR = o.headR ?? 0.62;
  const legs = [limb(o.legR??0.13, legH, o.legC??o.skin), limb(o.legR??0.13, legH, o.legC??o.skin)];
  legs[0].position.set(-bodyR*0.5, legH+0.16, 0);
  legs[1].position.set( bodyR*0.5, legH+0.16, 0);

function eyes(headG, headR, c=0x2b2118, dx=0.22, dy=0.05, r=0.07, fz=0.92){

const WORLD = {minX:-54, maxX:54, minZ:-38, maxZ:42};
const kids = [];
const tmpV = new THREE.Vector3();
let lastChatAt = -99; /* 말풍선 동시 발생 방지 */
let songmi = null;
function setCharacterLabelsVisible(visible){
  characterLabelsVisible = visible;
  if(labelToggleInput) labelToggleInput.checked = visible;
  kids.forEach(k=>{ if(k.label) k.label.visible = visible; });
}

class Kid {
  constructor(cfg){
    Object.assign(this, cfg);
    const b = this.build;
    this.b = b;
    this.g = b.g;
    this.g.scale.setScalar(this.scale ?? 1);
    this.g.position.copy(this.home);
    this.state = 'play';
    this.phase = Math.random()*10;
    this.playT = Math.random()*10;
    this.walkAmt = 0;
    this.heading = Math.random()*Math.PI*2;
    this.g.rotation.y = this.heading;
    this.offA = Math.random()*Math.PI*2;
    this.bubble = null; this.bubbleT = 0;
    this.startleT = 0; this.celebT = 0;
    this.gotoTarget = null;
    this.ambientT = 14 + Math.random()*26;
    this.label = makeLabel(`${this.name} · ${this.owner}`, this.color);
    this.label.position.y = (b.headTop + 0.75);
    this.label.visible = characterLabelsVisible;
    this.g.add(this.label);
    scene.add(this.g);
  }
  get pos(){ return this.g.position; }
  say(text){
    if(this.bubble){ this.g.remove(this.bubble); this.bubble.material.map.dispose(); this.bubble.material.dispose(); }
    this.bubble = makeBubble(text ?? pick(this.lines));
    this.bubble.position.y = this.b.headTop + 1.7;
    this.g.add(this.bubble);
    this.bubbleT = 2.8;
  }
  startle(){
    this.startleT = 1.4;
    puff(exclTex, this.pos.clone().add(new THREE.Vector3(0, this.b.headTop*this.g.scale.x+1, 0)), 1, {size:1, life:1});
  }
  moveToward(target, dt, mul=1){
    tmpV.copy(target).sub(this.pos); tmpV.y = 0;
    const d = tmpV.length();
    if(d > 0.05){
      const want = Math.atan2(tmpV.x, tmpV.z);
      let diff = want - this.heading;
      while(diff > Math.PI) diff -= Math.PI*2;
      while(diff < -Math.PI) diff += Math.PI*2;
      this.heading += diff * Math.min(1, dt*7);
      this.g.rotation.y = this.heading;
      const step = Math.min(d, this.speed*mul*dt);
      this.pos.x += Math.sin(this.heading)*step;
      this.pos.z += Math.cos(this.heading)*step;
      this.pos.x = THREE.MathUtils.clamp(this.pos.x, WORLD.minX, WORLD.maxX);
      this.pos.z = THREE.MathUtils.clamp(this.pos.z, WORLD.minZ, WORLD.maxZ);
      this.walkAmt = Math.min(1, this.walkAmt + dt*6);
    } else this.walkAmt = Math.max(0, this.walkAmt - dt*6);
    return d;
  }
  idle(){ this.walkAmt = Math.max(0, this.walkAmt - 0.06); }
  locomote(dt, t){
    const b = this.b, w = this.walkAmt;
    this.phase += dt * (this.speed*1.5) * (w>0.05?1:0.3);
    const s = Math.sin(this.phase);
    if(this.moveStyle === 'hop'){
      this.g.position.y = Math.abs(Math.sin(this.phase*1.4)) * 0.45 * Math.max(w, 0.25);
      const sq = 1 - Math.sin(this.phase*1.4)*0.06;
      const sc = this.scale ?? 1;
      this.g.scale.set(sc, sc*sq, sc);
    } else if(this.moveStyle === 'skate'){
      this.g.position.y = 0;
      this.g.rotation.z = s*0.06*w;
      b.legs.forEach(l=> l.rotation.x = 0.15);
      b.arms[0].rotation.x = 0.5*w; b.arms[1].rotation.x = -0.3*w;
    } else {
      const amp = this.moveStyle==='march' ? 0.85 : 0.55;
      b.legs[0].rotation.x = s*amp*w;
      b.legs[1].rotation.x = -s*amp*w;
      b.arms[0].rotation.x = -s*amp*0.8*w;
      b.arms[1].rotation.x = s*amp*0.8*w;
      if(this.moveStyle==='march'){
        b.arms[0].rotation.x = -s*1.1*w; b.arms[1].rotation.x = s*1.1*w;
      }
      if(w > 0.1){
        b.arms[0].rotation.z *= 1-Math.min(1,dt*4);
        b.arms[1].rotation.z *= 1-Math.min(1,dt*4);
      }
      this.g.position.y = Math.abs(s)*0.08*w + Math.sin(t*2+this.offA)*0.02;
    }
  }
  /* 한가할 때 가끔 깡총 뛰거나 몸을 흔드는 등 소소한 행동 (locomote 이후 호출) */
  idleFlair(dt, t){
    if(!this.flair) return;
    const b = this.b;
    if(this._flairUntil > t){
      const u = 1 - (this._flairUntil - t)/this._flairDur;
      if(this._flairKind === 'hop'){
        this.g.position.y += Math.abs(Math.sin(u*Math.PI*3))*0.3;
      } else if(this._flairKind === 'jump'){
        this.g.position.y += Math.sin(u*Math.PI)*0.85;
      } else if(this._flairKind === 'wiggle'){
        this.g.rotation.z = Math.sin(u*Math.PI*5)*0.12*Math.sin(u*Math.PI);
      } else if(this._flairKind === 'wave' && b.arms?.length>=2){
        b.arms[1].rotation.z = -0.3 - Math.abs(Math.sin(u*Math.PI*3))*1.1;
      }
      return;
    }
    if(this._flairKind){
      if(b.arms?.length>=2) b.arms[1].rotation.z = 0;
      this.g.rotation.z = 0;
      this._flairKind = null;
    }
    if(this._flairNext === undefined) this._flairNext = t + 4 + Math.random()*8;
    if(t >= this._flairNext && this.walkAmt < 0.2){
      this._flairKind = pick(this.flairKinds || ['hop','wiggle','jump']);
      this._flairDur = 1.0 + Math.random()*0.7;
      this._flairUntil = t + this._flairDur;
      this._flairNext = t + 9 + Math.random()*12;
      puff(Math.random()<0.5?heartTex:sparkTex, this.pos.clone().setY(b.headTop*0.85), 1, {size:0.45});
      if(this.emotes && Math.random()<0.55 && t-lastChatAt>3){ this.say(pick(this.emotes)); lastChatAt=t; }
    }
  }
  update(dt, t){
    if(this.bubble){
      this.bubbleT -= dt;
      if(this.bubbleT <= 0){ this.g.remove(this.bubble); this.bubble=null; }
    }
    if(this.startleT > 0){
      this.startleT -= dt;
      const k = Math.max(0, this.startleT/1.4);
      this.g.position.y = Math.abs(Math.sin(k*Math.PI*3)) * 0.8;
      this.idle();
      return;
    }
    if(this.state === 'event') return; /* 이벤트 매니저가 제어 */
    if(this.celebT > 0){
      this.celebT -= dt;
      this.g.position.y = Math.abs(Math.sin(this.celebT*9)) * 0.5;
      if(Math.random() < dt*2) puff(heartTex, this.pos.clone().setY(this.b.headTop*0.8), 1, {size:0.55});
      if(this.celebT <= 0) this.state = 'return';
      return;
    }
    if(this.state === 'goto' && this.gotoTarget){
      const d = this.moveToward(this.gotoTarget, dt, 1.25);
      this.locomote(dt, t);
      if(d < 1){ this.celebT = 1.1; this.gotoTarget=null; }
      return;
    }
    if(this.state === 'return'){
      const d = this.moveToward(this.home, dt);
      this.locomote(dt, t);
      if(d < 0.8){ this.state='play'; this.playT = 0; }
      return;
    }
    this.playT += dt;
    /* 가끔 혼잣말 (전역 3초 간격 보장으로 동시다발 방지) */
    this.ambientT -= dt;
    if(this.ambientT <= 0){
      if(t - lastChatAt > 3){ this.say(); lastChatAt = t; }
      this.ambientT = 24 + Math.random()*24;
    }
    this._skipLocomote = false;
    this.play(this, dt, t);
    if(this._skipLocomote) this._skipLocomote = false;
    else this.locomote(dt, t);
    this.idleFlair(dt, t);
  }
}

function wanderPlay(center, radius, pauseMin=3, pauseMax=7){
  return (k, dt)=>{
    if(!k._tgt || k._wait > 0){
      if(k._wait > 0){ k._wait -= dt; k.idle(); return; }
      const a = Math.random()*Math.PI*2, r = Math.random()*radius;
      k._tgt = new THREE.Vector3(center.x+Math.cos(a)*r, 0, center.z+Math.sin(a)*r);
    }
    const d = k.moveToward(k._tgt, dt, 0.4);
    if(d < 0.5){ k._tgt = null; k._wait = pauseMin + Math.random()*(pauseMax-pauseMin); }
  };
}
function restoreLimbBasePositions(k){
  k.b.arms?.forEach(a=>{ if(a.userData.basePosition) a.position.copy(a.userData.basePosition); });
  k.b.legs?.forEach(l=>{ if(l.userData.basePosition) l.position.copy(l.userData.basePosition); });
}
function applyMonkeyClimbPose(k, u, t){
  const step = u * Math.PI * 8;
  const pullL = Math.max(0, Math.sin(step));
  const pullR = Math.max(0, -Math.sin(step));
  const grip = Math.sin(step);
  const arms = k.b.arms ?? [], legs = k.b.legs ?? [];
  k.g.rotation.x = Math.sin(step*0.5) * 0.07;
  k.g.rotation.z = grip * 0.05;
  k.walkAmt = 0.75;
  if(arms.length >= 2){
    arms[0].rotation.x = -2.15 + pullR*0.7;
    arms[1].rotation.x = -2.15 + pullL*0.7;
    arms[0].rotation.z = -0.42 - pullL*0.46;
    arms[1].rotation.z = 0.42 + pullR*0.46;
    arms[0].position.copy(arms[0].userData.basePosition);
    arms[1].position.copy(arms[1].userData.basePosition);
    arms[0].position.y += pullL*0.24;
    arms[1].position.y += pullR*0.24;
  }
  if(legs.length >= 2){
    legs[0].rotation.x = 1.25 - pullL*1.05;
    legs[1].rotation.x = 1.25 - pullR*1.05;
    legs[0].rotation.z = -0.22 - pullL*0.42;
    legs[1].rotation.z = 0.22 + pullR*0.42;
    legs[0].position.copy(legs[0].userData.basePosition);
    legs[1].position.copy(legs[1].userData.basePosition);
    legs[0].position.y += pullL*0.5;
    legs[1].position.y += pullR*0.5;
    legs[0].position.z += pullL*0.24;
    legs[1].position.z += pullR*0.24;
  }
}

/* 술래잡기 추격: 상대에게 바짝 붙지 않고 일정 간격(gap)을 유지하며 쫓기 */
const TAG_GAP = 3.0;
const _gapDir = new THREE.Vector3(), _gapAim = new THREE.Vector3();
function chaseKeepingGap(k, targetPos, dt, mul, gap=TAG_GAP){
  _gapDir.copy(k.pos).sub(targetPos).setY(0);
  if(_gapDir.lengthSq() < 1e-4) _gapDir.set(0,0,1);
  _gapDir.normalize();
  _gapAim.copy(targetPos).addScaledVector(_gapDir, gap);
  k.moveToward(_gapAim, dt, mul);
  return k.pos.distanceTo(targetPos);
}
/* 두 캐릭터가 일정 거리(minD)보다 가까워지면 서로 밀어내 절대 겹치지 않게 함(뽀뽀 방지) */
const TAG_MIN_DIST = 2.4;
function enforceMinGap(a, b, minD=TAG_MIN_DIST){
  _gapDir.copy(a.pos).sub(b.pos).setY(0);
  let d = _gapDir.length();
  if(d < 1e-4){ _gapDir.set(1,0,0); d = 1e-4; }
  if(d < minD){
    _gapDir.multiplyScalar(1/d);
    const push = (minD - d) * 0.5;
    a.pos.addScaledVector(_gapDir, push);
    b.pos.addScaledVector(_gapDir, -push);
    a.pos.x = THREE.MathUtils.clamp(a.pos.x, WORLD.minX, WORLD.maxX);
    a.pos.z = THREE.MathUtils.clamp(a.pos.z, WORLD.minZ, WORLD.maxZ);
    b.pos.x = THREE.MathUtils.clamp(b.pos.x, WORLD.minX, WORLD.maxX);
    b.pos.z = THREE.MathUtils.clamp(b.pos.z, WORLD.minZ, WORLD.maxZ);
  }
}

const MAX_EVENT_SECONDS = 120;
const SUDAL_CHALK_FADE_SECONDS = 120;

let sudalChalkFadeT = 0;
const trackPt = (lane,a,out)=> out.set(Math.cos(a)*lane, 0, -4+Math.sin(a)*lane*0.56);
function cueRunner(){
  const cues=[];
  return {
    add(at,k,text){ cues.push({at,k,text,done:false}); },
    run(t){ for(const c of cues){ if(!c.done && t>=c.at){ c.done=true; c.k.say(c.text); } } }
  };
}
function takeKids(n, filter){
  const avail = shuffle(kids.filter(k=>k.state==='play' && (!filter||filter(k))));
  if(avail.length < n) return null;
  return avail.slice(0,n);
}
function setSudalChalkProgress(u){
  sudalChalk.visible = true;
  sudalChalkFadeT = 0;
  sudalChalkMat.opacity = THREE.MathUtils.clamp(u, 0, 1);
}
function startSudalChalkFade(){
  sudalChalk.visible = true;
  sudalChalkFadeT = SUDAL_CHALK_FADE_SECONDS;
  sudalChalkMat.opacity = 1;
}
function hideSudalChalk(){
  sudalChalkFadeT = 0;
  sudalChalkMat.opacity = 0;
  sudalChalk.visible = false;
}
function updateSudalChalkFade(dt){
  if(sudalChalkFadeT <= 0) return;
  sudalChalkFadeT = Math.max(0, sudalChalkFadeT - dt);
  sudalChalkMat.opacity = sudalChalkFadeT / SUDAL_CHALK_FADE_SECONDS;
  if(sudalChalkFadeT <= 0) sudalChalk.visible = false;
}
function sudalChalkState(){
  return {
    visible:sudalChalk.visible,
    opacity:Math.round(sudalChalkMat.opacity*1000)/1000,
    fadeRemaining:Math.round(sudalChalkFadeT*10)/10
  };
}
function moveKidFreelyToward(k, target, dt, mul=1){
  tmpV.copy(target).sub(k.pos);
  tmpV.y = 0;
  const d = tmpV.length();
  if(d > 0.05){
    const want = Math.atan2(tmpV.x, tmpV.z);
    let diff = want - k.heading;
    while(diff > Math.PI) diff -= Math.PI*2;
    while(diff < -Math.PI) diff += Math.PI*2;
    k.heading += diff * Math.min(1, dt*7);
    k.g.rotation.y = k.heading;
    const step = Math.min(d, k.speed*mul*dt);
    k.pos.x += Math.sin(k.heading)*step;
    k.pos.z += Math.cos(k.heading)*step;
    k.walkAmt = Math.min(1, k.walkAmt + dt*6);
  } else {
    k.walkAmt = Math.max(0, k.walkAmt - dt*6);
  }
  return d;
}
function resetEventPose(k){
  k.g.rotation.x = 0;
  k.g.rotation.z = 0;
  k.g.position.y = 0;
  k.walkAmt = 0;
  k.gotoTarget = null;
  k.celebT = 0;
  k.startleT = 0;
  k._tagWithKodol = null;
  k._skipLocomote = false;
  if(k.b.headG) k.b.headG.rotation.set(0,0,0);
  if(k.b.arms?.length){
    k.b.arms.forEach(a=>{
      a.rotation.x = 0; a.rotation.z = 0;
      if(a.userData.basePosition) a.position.copy(a.userData.basePosition);
    });
  }
  if(k.b.legs?.length){
    k.b.legs.forEach(l=>{
      l.rotation.x = 0; l.rotation.z = 0;
      if(l.userData.basePosition) l.position.copy(l.userData.basePosition);
    });
  }
}
function release(ms){ ms.forEach(m=>{ const k=m.k??m; resetEventPose(k); k.state='return'; }); }
function releaseActiveEventKids(){ release(kids.filter(k=>k.state==='event')); }
function limitEventDuration(ev, timeoutSeconds=MAX_EVENT_SECONDS, releaseKidsOnTimeout=true){
  if(!ev) return null;
  let elapsed = 0, timedOut = false;
  const finish = (ctx={})=>{
    if(timedOut) return;
    timedOut = true;
    ev.cancel?.(ctx);
    if(releaseKidsOnTimeout) releaseActiveEventKids();
  };
  return {
    ...ev,
    cancel:finish,
    update(dt,t){
      if(timedOut) return true;
      if(elapsed + dt >= timeoutSeconds){
        finish({timedOut:true});
        return true;
      }
      elapsed += dt;
      return ev.update(dt,t);
    }
  };
}

function makeRace(){
  const ms = takeKids(3);
  if(!ms) return null;
  const lanes=[27.6,29.0,30.4], a0=0.55, aEnd=a0+Math.PI*1.25;
  const members = ms.map((k,i)=>({k, lane:lanes[i], delay:i*1.8+Math.random()*0.9,
    a:a0, spd:0.10+Math.random()*0.035, done:false, sayAt:null}));
  ms.forEach(k=>k.state='event');
  let phase='gather', pt=0, winner=null, loserIdx=0;
  const cue=cueRunner(), tv=new THREE.Vector3();
  return { update(dt,t){
    pt += dt;
    if(phase==='gather'){
      let all=true;
      for(const m of members){
        m.delay -= dt;
        if(m.delay>0){ m.k.idle(); m.k.locomote(dt,t); all=false; continue; }
        trackPt(m.lane,a0,tv);
        const d=m.k.moveToward(tv,dt,0.85); m.k.locomote(dt,t);
        if(d>=0.9) all=false;
      }
      if(all){ phase='ready'; pt=0;
        cue.add(0.3,members[0].k,'우리 달리기 시합 하자!');
        members.slice(1).forEach((m,i)=>cue.add(1.5+i*1.1,m.k,pick(['좋아, 간다~!','준비 됐어!','이번엔 안 져!'])));
      }
    } else if(phase==='ready'){
      cue.run(pt);
      members.forEach(m=>{ m.k.idle(); m.k.locomote(dt,t); });
      if(pt>3.6){ phase='run'; pt=0; }
    } else if(phase==='run'){
      let all=true;
      for(const m of members){
        if(m.sayAt!==null && pt>=m.sayAt){
          m.k.say(pick(['우와 재밌었다!','다음엔 내가 1등 할 거야!','헥헥, 숨차~'])); m.sayAt=null;
        }
        if(m.done){ m.k.idle(); m.k.locomote(dt,t); continue; }
        all=false;
        m.a += m.spd*dt;
        trackPt(m.lane,m.a,tv);
        m.k.g.position.x=tv.x; m.k.g.position.z=tv.z;
        m.k.heading = Math.atan2(-Math.sin(m.a)*m.lane, Math.cos(m.a)*m.lane*0.56);
        m.k.g.rotation.y = m.k.heading;
        m.k.walkAmt = 1; m.k.locomote(dt,t);
        if(Math.random()<dt*0.25) puff(sparkTex, m.k.pos.clone().setY(0.3),1,{size:0.35});
        if(m.a >= aEnd){
          m.done = true;
          if(!winner){ winner=m; m.k.say('야호! 내가 1등! 🏆');
            puff(sparkTex, m.k.pos.clone().setY(2.2), 5, {size:0.7}); }
          else { m.sayAt = pt + 0.7 + (loserIdx++)*0.9; }
        }
      }
      if(all){ phase='end'; pt=0; }
    } else {
      members.forEach(m=>{ m.k.idle(); m.k.locomote(dt,t); });
      if(pt>2.4){ release(members); return true; }
    }
    return false;
  }};
}

function makeDance(){
  const ms = takeKids(4, k=>k.moveStyle!=='skate');
  if(!ms) return null;
  const center = new THREE.Vector3(8,0,20), R=2.6;
  const members = ms.map((k,i)=>({k, delay:i*1.7+Math.random()*0.8,
    ang:i/ms.length*Math.PI*2, noteT:1+Math.random()*2}));
  ms.forEach(k=>k.state='event');
  let phase='gather', pt=0;
  const cue=cueRunner(), tv=new THREE.Vector3();
  return { update(dt,t){
    pt += dt;
    if(phase==='gather'){
      let all=true;
      for(const m of members){
        m.delay -= dt;
        if(m.delay>0){ m.k.idle(); m.k.locomote(dt,t); all=false; continue; }
        tv.set(center.x+Math.cos(m.ang)*R, 0, center.z+Math.sin(m.ang)*R);
        const d=m.k.moveToward(tv,dt,0.8); m.k.locomote(dt,t);
        if(d>=0.7) all=false;
      }
      if(all){ phase='perform'; pt=0;
        cue.add(0.3,members[0].k,'우리 같이 춤추자~ ♪');
        members.slice(1).forEach((m,i)=>cue.add(2+i*1.6,m.k,pick(['랄랄라~','빙글빙글~','신난다!'])));
      }
    } else if(phase==='perform'){
      cue.run(pt);
      const base = pt*0.45;
      for(const [i,m] of members.entries()){
        const a = m.ang + base;
        m.k.g.position.x = center.x + Math.cos(a)*R;
        m.k.g.position.z = center.z + Math.sin(a)*R;
        m.k.heading = Math.atan2(-Math.sin(a), Math.cos(a));
        m.k.g.rotation.y = m.k.heading;
        m.k.walkAmt = 0.7;
        m.k.locomote(dt,t);
        m.k.b.arms[0].rotation.z = 2.3 + Math.sin(t*2.5+i)*0.35;
        m.k.b.arms[1].rotation.z = -2.3 - Math.sin(t*2.5+i)*0.35;
        m.noteT -= dt;
        if(m.noteT<=0){ puff(noteTex, m.k.pos.clone().setY(2.4), 1, {size:0.55}); m.noteT = 1.8+Math.random()*1.8; }
      }
      if(pt>16){ phase='end'; pt=0;
        members.forEach((m,i)=>{ if(Math.random()<0.6) cue.add(0.4+i*0.9, m.k, pick(['재밌었어!','또 추자~','어지러워, 하하!'])); });
      }
    } else {
      cue.run(16+pt);
      members.forEach(m=>{
        m.k.idle(); m.k.locomote(dt,t);
        m.k.b.arms[0].rotation.z = 0; m.k.b.arms[1].rotation.z = 0;
      });
      if(pt>2.6){ release(members); return true; }
    }
    return false;
  }};
}

function makeChat(){
  const ms = takeKids(3);
  if(!ms) return null;
  const center = new THREE.Vector3(12,0,-36.5), R=1.8;
  const members = ms.map((k,i)=>({k, delay:i*1.9+Math.random(), ang:i/ms.length*Math.PI*2}));
  ms.forEach(k=>k.state='event');
  let phase='gather', pt=0;
  const cue=cueRunner(), tv=new THREE.Vector3();
  return { update(dt,t){
    pt += dt;
    if(phase==='gather'){
      let all=true;
      for(const m of members){
        m.delay -= dt;
        if(m.delay>0){ m.k.idle(); m.k.locomote(dt,t); all=false; continue; }
        tv.set(center.x+Math.cos(m.ang)*R, 0, center.z+Math.sin(m.ang)*R);
        const d=m.k.moveToward(tv,dt,0.8); m.k.locomote(dt,t);
        if(d>=0.6) all=false;
      }
      if(all){ phase='perform'; pt=0;
        for(let r=0;r<2;r++) members.forEach((m,i)=>
          cue.add(0.5+(r*members.length+i)*2.8, m.k, pick(m.k.lines)));
      }
    } else if(phase==='perform'){
      cue.run(pt);
      for(const m of members){
        m.k.idle();
        const want = Math.atan2(center.x-m.k.pos.x, center.z-m.k.pos.z);
        let diff = want-m.k.heading;
        while(diff>Math.PI)diff-=Math.PI*2; while(diff<-Math.PI)diff+=Math.PI*2;
        m.k.heading += diff*Math.min(1,dt*4);
        m.k.g.rotation.y = m.k.heading;
        m.k.locomote(dt,t);
        if(Math.random()<dt*0.25) puff(heartTex, m.k.pos.clone().setY(2.2),1,{size:0.4});
      }
      if(pt > members.length*2.8*2+2){ phase='end'; pt=0; }
    } else {
      members.forEach(m=>{ m.k.idle(); m.k.locomote(dt,t); });
      if(pt>1){ release(members); return true; }
    }
    return false;
  }};
}

function makeSlideEvt(){
  const ms = takeKids(2, k=>k.moveStyle!=='skate');
  if(!ms) return null;
  const members = ms.map((k,i)=>({k, idx:i, stage:'walk', u:0}));
  ms.forEach(k=>k.state='event');
  let pt=0;
  const tv=new THREE.Vector3();
  return { update(dt,t){
    pt += dt;
    let allDone=true;
    for(const m of members){
      const k=m.k;
      if(m.stage==='done'){ continue; }
      allDone=false;
      if(m.stage==='walk'){
        const d=k.moveToward(slidePath.queue(m.idx),dt,0.8); k.locomote(dt,t);
        if(d<0.6) m.stage='wait';
      } else if(m.stage==='wait'){
        k.idle(); k.locomote(dt,t);
        const prev = members[m.idx-1];
        if(!prev || prev.stage==='slide' || prev.stage==='cheer' || prev.stage==='done'){
          m.stage='climb'; m.u=0;
        }
      } else if(m.stage==='climb'){
        m.u += dt/2.6;
        const u = Math.min(1,m.u);
        k.g.position.lerpVectors(slidePath.ladderBase, slidePath.top, u);
        k.g.position.y += Math.abs(Math.sin(u*Math.PI*5))*0.06;
        k.heading = Math.PI; k.g.rotation.y = Math.PI;
        k.walkAmt = 0.6; k.locomote(dt,t);
        k.g.position.y = Math.max(k.g.position.y, slidePath.ladderBase.y + (slidePath.top.y)*u);
        if(m.u>=1){ m.stage='top'; m.u=0; k.say('슝~ 간다!'); }
      } else if(m.stage==='top'){
        m.u += dt;
        k.g.position.copy(slidePath.top);
        k.heading = Math.PI/2; k.g.rotation.y = Math.PI/2;
        k.idle();
        if(m.u>0.9){ m.stage='slide'; m.u=0; }
      } else if(m.stage==='slide'){
        m.u += dt/1.1;
        const u = Math.min(1, m.u);
        const e = u*u;
        k.g.position.lerpVectors(slidePath.rampTop, slidePath.rampEnd, e);
        k.heading = Math.PI/2; k.g.rotation.y = Math.PI/2;
        k.walkAmt = 0;
        if(Math.random()<dt*2) puff(sparkTex, k.pos.clone().setY(0.6),1,{size:0.4});
        if(m.u>=1){ m.stage='cheer'; m.u=0; }
      } else if(m.stage==='cheer'){
        m.u += dt;
        k.g.position.x = slidePath.exit.x; k.g.position.z = slidePath.exit.z + m.idx*1.4;
        k.g.position.y = Math.abs(Math.sin(m.u*7))*0.4;
        if(m.u>1.3){ m.stage='done';
          if(Math.random()<0.7) k.say(pick(['우와 재밌다!','한 번 더!','짜릿해~'])); }
      }
    }
    if(allDone && pt>3){ release(members); return true; }
    return false;
  }};
}

function makeMonkeyClimbEvt(){
  const ms = takeKids(1, k=>k.name==='뭉키');
  if(!ms) return null;
  const k = ms[0];
  k.state = 'event';
  k.gotoTarget = null; k.celebT = 0; k.startleT = 0;
  const tx = monkeyTree.position.x, tz = monkeyTree.position.z;
  const climbH = monkeyTree.userData.climbHeight ?? 13;
  const anchor = monkeyTree.userData.swingAnchor ?? new THREE.Vector3(tx-5.8, climbH, tz+1.2);
  const base = new THREE.Vector3(tx-1.2,0,tz+0.8);
  let phase='gather', pt=0, said=false;
  return {kind:'monkeyClimb', update(dt,t){
    pt += dt;
    if(phase === 'gather'){
      const d = k.moveToward(base, dt, 1);
      k.locomote(dt,t);
      if(d < 0.7){ phase='climb'; pt=0; k.say('높은 나무도 척척!'); }
    } else if(phase === 'climb'){
      const u = Math.min(1, pt/5.2);
      k.g.position.set(tx-1.2+Math.sin(u*Math.PI*12)*0.08, climbH*u, tz+0.75+Math.sin(u*Math.PI*6)*0.06);
      k.heading = 0; k.g.rotation.y = 0;
      applyMonkeyClimbPose(k, u, t);
      if(Math.random()<dt*1.1) puff(sparkTex, k.pos.clone().setY(k.pos.y+0.9), 1, {size:0.42});
      if(u>=1){ phase='grab'; pt=0; }
    } else if(phase === 'grab'){
      const u = Math.min(1, pt/1.4);
      restoreLimbBasePositions(k);
      k.g.position.set(
        THREE.MathUtils.lerp(tx-1.2, anchor.x, u),
        THREE.MathUtils.lerp(climbH, anchor.y-1.75, u),
        THREE.MathUtils.lerp(tz+0.8, anchor.z, u)
      );
      k.g.rotation.y = 0;
      k.b.arms[0].rotation.x = -2.6; k.b.arms[1].rotation.x = -2.6;
      k.b.arms[0].rotation.z = -0.72; k.b.arms[1].rotation.z = 0.72;
      if(u>=1){ phase='swing'; pt=0; k.say('가지에 매달렸어!'); }
    } else if(phase === 'swing'){
      const swing = Math.sin(pt*2.4);
      k.g.position.set(anchor.x, anchor.y-1.75 + Math.abs(swing)*0.28, anchor.z + swing*2.1);
      k.g.rotation.y = 0;
      k.g.rotation.x = -swing*0.26;
      k.g.rotation.z = 0;
      k.idle();
      k.b.arms[0].rotation.x = -2.7; k.b.arms[1].rotation.x = -2.7;
      k.b.arms[0].rotation.z = -0.75; k.b.arms[1].rotation.z = 0.75;
      k.b.legs[0].rotation.x = 0.8 + swing*0.25;
      k.b.legs[1].rotation.x = 0.8 - swing*0.25;
      if(!said && pt>2.2){ said=true; k.say('팔로 슝~ 스윙!'); }
      if(Math.random()<dt*1.1) puff(sparkTex, k.pos.clone().setY(k.pos.y+1.4), 1, {size:0.42});
      if(pt>9){ phase='down'; pt=0; }
    } else if(phase === 'down'){
      const u = Math.min(1, pt/2.5);
      restoreLimbBasePositions(k);
      k.g.position.set(
        THREE.MathUtils.lerp(anchor.x, base.x, u),
        THREE.MathUtils.lerp(anchor.y-1.75, 0, u),
        THREE.MathUtils.lerp(anchor.z, base.z, u)
      );
      k.g.rotation.x = 0;
      k.g.rotation.z = 0;
      k.g.rotation.y = 0;
      k.b.arms[0].rotation.z = 0; k.b.arms[1].rotation.z = 0;
      k.b.arms[0].rotation.x = -1.4; k.b.arms[1].rotation.x = -1.4;
      if(u>=1){ phase='end'; pt=0; k.say('스윙 성공!'); }
    } else {
      k.idle(); k.locomote(dt,t);
      if(pt>1.8){
        k.b.arms[0].rotation.x = 0; k.b.arms[1].rotation.x = 0;
        k.b.arms[0].rotation.z = 0; k.b.arms[1].rotation.z = 0;
        k.g.rotation.x = 0;
        k.g.rotation.z = 0;
        release([k]);
        return true;
      }
    }
    return false;
  }};
}

function makeKodolSongmiTagEvt(){
  const kodol = kids.find(k=>k.name==='코돌이' && k.state==='play');
  const song = songmi && songmi.state === 'play' ? songmi : null;
  if(!kodol || !song) return null;
  const kodolStart = new THREE.Vector3(-11.5,0,16);
  const songStart = new THREE.Vector3(-15,0,14.8);
  const tagPath = [
    new THREE.Vector3(-11,0,16),
    new THREE.Vector3(-2,0,25),
    new THREE.Vector3(10,0,22),
    new THREE.Vector3(12,0,12),
    new THREE.Vector3(1,0,8),
    new THREE.Vector3(-12,0,10)
  ];
  const tagCurve = new THREE.CatmullRomCurve3(tagPath, true, 'catmullrom', 0.45);
  [kodol,song].forEach(k=>{
    k.state='event';
    k.gotoTarget=null;
    k.celebT=0;
    k.startleT=0;
    k.walkAmt=0;
    k._tagWithKodol=null;
  });
  let phase='gather', pt=0, cleaned=false;
  let kodolTease=false, songIntroReply=false, songTrailLine=false, caught=false, swapped=false, cheered=false;
  const tv = new THREE.Vector3();
  const behind = new THREE.Vector3();
  const turnTo = (k,target,dt,rate=5)=>{
    tv.copy(target).sub(k.pos); tv.y = 0;
    if(tv.lengthSq() < 0.0001) return;
    const want = Math.atan2(tv.x, tv.z);
    let diff = want-k.heading;
    while(diff>Math.PI) diff-=Math.PI*2;
    while(diff<-Math.PI) diff+=Math.PI*2;
    k.heading += diff*Math.min(1, dt*rate);
    k.g.rotation.y = k.heading;
  };
  const pathPoint = (u, out)=> out.copy(tagCurve.getPointAt((u%1+1)%1));
  const runPose = (k,t,lean=0.08)=>{
    k.b.headG.rotation.x = lean + Math.sin(t*4.2)*0.04;
    if(k.b.arms?.length >= 2){
      k.b.arms[0].rotation.z = -0.18 + Math.sin(t*5)*0.1;
      k.b.arms[1].rotation.z = 0.18 - Math.sin(t*5)*0.1;
    }
  };
  const finish = ()=>{
    if(cleaned) return;
    cleaned = true;
    kodol._tagWithKodol = null;
    song._tagWithKodol = null;
    release([kodol,song]);
  };
  return {kind:'kodolSongmiTag', cancel:finish, update(dt,t){
    pt += dt;
    if(phase === 'gather'){
      const kd = moveKidFreelyToward(kodol, kodolStart, dt, 1.6);
      const sd = moveKidFreelyToward(song, songStart, dt, 1.45);
      kodol.locomote(dt,t);
      song.locomote(dt,t);
      if(kd < 0.7 && sd < 0.7){
        phase='intro';
        pt=0;
      }
    } else if(phase === 'intro'){
      kodol.idle(); song.idle();
      turnTo(kodol, song.pos, dt);
      turnTo(song, kodol.pos, dt);
      kodol.locomote(dt,t);
      song.locomote(dt,t);
      if(!kodolTease && pt > 0.35){
        kodolTease = true;
        kodol.say('나 잡아봐!');
        if(kodol.b.arms?.length >= 2){
          kodol.b.arms[0].rotation.x = -1.05;
          kodol.b.arms[1].rotation.x = -1.05;
        }
      }
      if(!songIntroReply && pt > 1.45){
        songIntroReply = true;
        song.say('코돌이, 기다려~!');
        song.b.headG.rotation.x = 0.18;
      }
      if(pt > 3.1){
        phase='chase';
        pt=0;
      }
    } else if(phase === 'chase'){
      const u = Math.min(0.78, pt/21*0.78);
      pathPoint(u, tv);
      moveKidFreelyToward(kodol, tv, dt, 1.5);
      behind.copy(kodol.pos).add(new THREE.Vector3(-Math.sin(kodol.heading)*TAG_GAP, 0, -Math.cos(kodol.heading)*TAG_GAP));
      const d = moveKidFreelyToward(song, behind, dt, 1.25);
      kodol.locomote(dt,t);
      song.locomote(dt,t);
      runPose(kodol,t,0.04);
      runPose(song,t,0.16);
      if(!songTrailLine && pt > 4){
        songTrailLine = true;
        song.say('발자국 따라간다~');
      }
      if(!caught && pt > 7.8){
        caught = true;
        kodol.say('송미야, 여기야!');
      }
      if(Math.random()<dt*0.6) puff(sparkTex, kodol.pos.clone().setY(0.4), 1, {size:0.34});
      if((pt > 9 && d < 1.15) || pt > 20){
        phase='catch';
        pt=0;
        caught=false;
      }
    } else if(phase === 'catch'){
      kodol.idle(); song.idle();
      turnTo(kodol, song.pos, dt);
      turnTo(song, kodol.pos, dt);
      kodol.locomote(dt,t);
      song.locomote(dt,t);
      if(!caught){
        caught = true;
        song.say('잡았다!');
        kodol.say('우와, 빠르다!');
        puff(heartTex, song.pos.clone().setY(1.8), 3, {size:0.5});
      }
      if(pt > 2.6){
        phase='swap';
        pt=0;
      }
    } else if(phase === 'swap'){
      if(!swapped){
        swapped = true;
        song.say('이번엔 내가 도망갈게!');
        kodol.say('이번엔 내가 술래!');
      }
      const u = 0.78 - Math.min(0.42, pt/12*0.42);
      pathPoint(u, tv);
      moveKidFreelyToward(song, tv, dt, 1.2);
      behind.copy(song.pos).add(new THREE.Vector3(-Math.sin(song.heading)*TAG_GAP, 0, -Math.cos(song.heading)*TAG_GAP));
      moveKidFreelyToward(kodol, behind, dt, 1.35);
      kodol.locomote(dt,t);
      song.locomote(dt,t);
      runPose(kodol,t,0.1);
      runPose(song,t,0.08);
      if(Math.random()<dt*0.45) puff(sparkTex, song.pos.clone().setY(0.4), 1, {size:0.34});
      if(pt > 12){
        phase='end';
        pt=0;
      }
    } else {
      kodol.idle(); song.idle();
      turnTo(kodol, song.pos, dt);
      turnTo(song, kodol.pos, dt);
      kodol.locomote(dt,t);
      song.locomote(dt,t);
      if(!cheered){
        cheered = true;
        kodol.say('또 하자!');
        song.say('단서보다 재미있어!');
      }
      if(pt > 2.2){
        finish();
        return true;
      }
    }
    enforceMinGap(kodol, song); /* 어떤 단계에서도 둘이 겹치지 않게 */
    return false;
  }};
}

function makeSudalChalkEvt(){
  const k = kids.find(k=>k.name==='수달이' && k.state==='play');
  if(!k) return null;
  const stand = new THREE.Vector3(-12, 0, -40.15);
  const leave = new THREE.Vector3(-10.4, 0, -37.2);
  const chalkPiece = cyl(0.045,0.045,0.55, 0xffffff, 0,0,0, 10);
  chalkPiece.rotation.z = Math.PI/2;
  scene.add(chalkPiece);
  k.state = 'event';
  k.gotoTarget = null;
  k.celebT = 0;
  k.startleT = 0;
  k.walkAmt = 0;
  let phase = 'approach', pt = 0, cleaned = false, wrote = false, saidWrite = false;
  const faceWall = ()=>{
    k.heading = Math.PI;
    k.g.rotation.y = Math.PI;
  };
  const setChalkPiece = (t)=>{
    chalkPiece.visible = true;
    const sx = -12 + Math.sin(t*2.1)*1.05;
    const sy = 6.58 + Math.sin(t*3.7)*0.24;
    chalkPiece.position.set(sx, sy, -42.58);
    chalkPiece.rotation.y = Math.PI/2 + Math.sin(t*1.8)*0.18;
  };
  const finish = (ctx={})=>{
    if(cleaned) return;
    cleaned = true;
    scene.remove(chalkPiece);
    chalkPiece.geometry?.dispose?.();
    chalkPiece.material?.dispose?.();
    if(ctx.manualSwitch && !wrote) hideSudalChalk();
    resetEventPose(k);
    release([k]);
  };
  return {kind:'sudalChalk', cancel:finish, update(dt,t){
    pt += dt;
    if(phase === 'approach'){
      const d = moveKidFreelyToward(k, stand, dt, 1.05);
      k.locomote(dt,t);
      chalkPiece.visible = false;
      if(d < 0.55){
        phase = 'write';
        pt = 0;
        k.say('잠깐만, 분필로 써야지!');
        setSudalChalkProgress(0);
      }
    } else if(phase === 'write'){
      k.g.position.copy(stand);
      faceWall();
      k.idle();
      k.locomote(dt,t);
      const writeU = Math.min(1, pt/8.5);
      setSudalChalkProgress(THREE.MathUtils.smoothstep(writeU, 0, 1));
      setChalkPiece(t);
      if(k.b.arms?.length >= 2){
        k.b.arms[0].rotation.x = -1.1 + Math.sin(t*5)*0.22;
        k.b.arms[1].rotation.x = -1.65 + Math.sin(t*6)*0.18;
        k.b.arms[1].rotation.z = -0.35 + Math.sin(t*4.2)*0.22;
      }
      if(!saidWrite && pt > 4.2){
        saidWrite = true;
        k.say('잘생긴 세훈이~');
      }
      if(writeU >= 1){
        wrote = true;
        startSudalChalkFade();
        phase = 'leave';
        pt = 0;
        k.say('다 썼다!');
      }
    } else if(phase === 'leave'){
      const d = moveKidFreelyToward(k, leave, dt, 1.1);
      k.locomote(dt,t);
      chalkPiece.visible = false;
      if(d < 0.7 || pt > 5.5){
        finish();
        return true;
      }
    }
    return false;
  }};
}

function clearCatGuest(cat){

  cat.group.traverse(o=>{
    if(o.userData?.isOutline) return;
    if(o.isMesh){ o.geometry?.dispose?.(); }
    if(o.material?.map) o.material.map.dispose();
    o.material?.dispose?.();
  });
}
function makeCatBallEvt(){
  const members = kids.map((k,i)=>({k, ang:i/kids.length*Math.PI*2, radius:11.5 + (i%2)*1.1}));
  if(!members.length) return null;
  const cat1 = createGuestCat(CAT_GUEST_DEFS[0]);
  const cat2 = createGuestCat(CAT_GUEST_DEFS[1]);
  cat1.group.scale.setScalar(1.15);
  cat2.group.scale.setScalar(1.1);
  cat1.group.position.set(-62,0,9);
  cat2.group.position.set(62,0,11);
  scene.add(cat1.group, cat2.group);
  toonify(cat1.group); toonify(cat2.group);
  const cageBall = createCageBall();
  cageBall.position.set(7,1.4,10);
  scene.add(cageBall);
  const center = new THREE.Vector3(7,0,10);
  const catPs = [
    {cat:cat1, ang:Math.PI*1.05, radius:5.8, name:'퐁냥이'},
    {cat:cat2, ang:Math.PI*1.95, radius:5.8, name:'코코'}
  ];
  const passers = [catPs[0], ...members.slice(0,Math.ceil(members.length/2)), catPs[1], ...members.slice(Math.ceil(members.length/2))];
  members.forEach(m=>{
    m.k.state='event';
    m.k.gotoTarget=null; m.k.celebT=0; m.k.startleT=0; m.k.walkAmt=0;
  });
  let pt=0, lastPass=-1, nextSpark=0;
  const fromV = new THREE.Vector3(), toV = new THREE.Vector3(), tv = new THREE.Vector3();
  const dur = MAX_EVENT_SECONDS;
  const outroStart = dur - 7;
  let cleaned = false;
  const finish = ()=>{
    if(cleaned) return;
    cleaned = true;
    members.forEach(m=>{
      if(m.k.b.arms?.length){
        m.k.b.arms[0].rotation.x = 0; m.k.b.arms[1].rotation.x = 0;
        m.k.b.arms[0].rotation.z = 0; m.k.b.arms[1].rotation.z = 0;
      }
    });
    release(members);
    clearCatGuest(cat1); clearCatGuest(cat2);
    scene.remove(cageBall);
    cageBall.traverse(o=>{
      if(o.isMesh){ o.geometry?.dispose?.(); o.material?.dispose?.(); }
    });
  };
  cat1.say('안녕! 우리랑 놀아줘!');
  cat2.say('공 던지기 하자!');
  return {kind:'catBall', cancel:finish, update(dt,t){
    pt += dt;
    const outro = pt > outroStart ? 1-THREE.MathUtils.smoothstep((pt-outroStart)/7, 0, 1) : 1;
    const intro = THREE.MathUtils.smoothstep(Math.min(pt/7,1), 0, 1);
    const visibleScale = Math.max(0.04, intro*outro);
    cat1.group.scale.setScalar(1.15*visibleScale);
    cat2.group.scale.setScalar(1.1*visibleScale);

    for(const [i,m] of members.entries()){
      const a = m.ang + Math.sin(pt*0.09+i)*0.08;
      tv.set(center.x + Math.cos(a)*m.radius, 0, center.z + Math.sin(a)*m.radius);
      const d = m.k.moveToward(tv,dt,0.85);
      if(d < 0.55) m.k.idle();
      m.k.locomote(dt,t);
      if(m.k.b.arms?.length){
        m.k.b.arms[0].rotation.x *= Math.max(0,1-dt*5);
        m.k.b.arms[1].rotation.x *= Math.max(0,1-dt*5);
        m.k.b.arms[0].rotation.z *= Math.max(0,1-dt*5);
        m.k.b.arms[1].rotation.z *= Math.max(0,1-dt*5);
      }
      const want = Math.atan2(center.x-m.k.pos.x, center.z-m.k.pos.z);
      let diff = want-m.k.heading;
      while(diff>Math.PI)diff-=Math.PI*2; while(diff<-Math.PI)diff+=Math.PI*2;
      m.k.heading += diff*Math.min(1,dt*3.2);
      m.k.g.rotation.y = m.k.heading;
    }
    for(const [i,p] of catPs.entries()){
      const a = p.ang + Math.sin(pt*0.12+i)*0.12;
      tv.set(center.x + Math.cos(a)*p.radius, 0, center.z + Math.sin(a)*p.radius);
      const startX = i===0 ? -62 : 62;
      const targetX = THREE.MathUtils.lerp(startX, tv.x, intro);
      p.cat.group.position.x += (targetX - p.cat.group.position.x) * Math.min(1,dt*2.2);
      p.cat.group.position.z += (tv.z - p.cat.group.position.z) * Math.min(1,dt*2.2);
      p.cat.group.position.y = Math.abs(Math.sin(t*2.4+i))*0.16;
      p.cat.lookAt(center);
      p.cat.paws[0].rotation.x = -0.8 + Math.sin(t*4+i)*0.45;
      p.cat.paws[1].rotation.x = -0.8 - Math.sin(t*4+i)*0.45;
    }

    if(pt < 7){
      cageBall.position.set(center.x, 1.3 + Math.sin(t*3)*0.25, center.z);
    } else {
      const passDur = 2.55;
      const passFloat = (pt-7)/passDur;
      const passIdx = Math.floor(passFloat) % passers.length;
      const u = passFloat - Math.floor(passFloat);
      const from = passers[passIdx];
      const to = passers[(passIdx+1)%passers.length];
      participantHand(from, fromV);
      participantHand(to, toV);
      const e = u<0.5 ? 2*u*u : 1-Math.pow(-2*u+2,2)/2;
      cageBall.position.lerpVectors(fromV, toV, e);
      cageBall.position.y += Math.sin(u*Math.PI)*2.6;
      cageBall.rotation.x += dt*3.8;
      cageBall.rotation.y += dt*3.1;
      if(passIdx !== lastPass){
        lastPass = passIdx;
        if(from.cat && to.k){
          from.cat.say(`${to.k.name} ${kidCallWord(to.k)}, 같이 놀아줘!`);
        } else if(to.cat && from.k){
          to.cat.say(`${from.k.name} ${kidCallWord(from.k)}, 한 번 더!`);
        } else if(to.k && (to.k._catSayT ?? 0) <= t){
          to.k.say(pick(['받았다!','나도 던질게!','퐁냥이, 코코 귀여워!','공이 반짝반짝해!']));
          to.k._catSayT = t + 8;
        }
      }
      const active = [from,to];
      for(const p of active){
        if(!p.k || !p.k.b.arms?.length) continue;
        p.k.b.arms[0].rotation.x = -1.45;
        p.k.b.arms[1].rotation.x = -1.45;
        p.k.b.arms[0].rotation.z = 0.35;
        p.k.b.arms[1].rotation.z = -0.35;
      }
    }

    nextSpark -= dt;
    if(nextSpark <= 0){
      nextSpark = 0.55;
      puff(sparkTex, cageBall.position.clone(), 1, {size:0.42, life:0.85});
    }
    if(pt < dur) return false;
    finish();
    return true;
  }};
}

/* ---------------- 밤이 축구 이벤트 ---------------- */
let ballOwnedByEvent = false;
function makeSoccerEvt(){
  const playing = kids.filter(k=>k.state==='play');
  const bami = playing.find(k=>k.name==='밤이');
  if(!bami || playing.length < 3) return null;
  const order = [bami, ...shuffle(playing.filter(k=>k!==bami))]; /* 밤이가 먼저 시작 */
  /* 운동장에 랜덤하게 흩어진 위치(서로 너무 겹치지 않게) */
  const spots = [];
  for(const k of order){
    let p, ok=false, tries=0;
    while(!ok && tries++<30){
      p = new THREE.Vector3((Math.random()*2-1)*18, 0, -4 + (Math.random()*2-1)*8.5);
      ok = spots.every(s=>s.distanceToSquared(p) > 16);
    }
    spots.push(p);
  }
  order.forEach(k=>{ k.state='event'; k.gotoTarget=null; k.celebT=0; k.startleT=0; k.walkAmt=0; });
  ballOwnedByEvent = true;
  ballVel.set(0,0,0);
  const goalTarget = new THREE.Vector3(0, 0.7, -15.4); /* 골대 안쪽 */
  const tv=new THREE.Vector3(), fromV=new THREE.Vector3(), toV=new THREE.Vector3();
  const handPos=(k,out)=> out.set(k.pos.x+Math.sin(k.heading)*0.55, 0.55, k.pos.z+Math.cos(k.heading)*0.55);
  let phase='gather', pt=0, segT=0, passIdx=0, cleaned=false, scored=false, cheered=false;
  const finish=()=>{ if(cleaned)return; cleaned=true; ballOwnedByEvent=false; ballVel.set(0,0,0);
    ball.position.set(2,0.55,-2); order.forEach(k=>{ if(k.b.legs?.length) k.b.legs.forEach(l=>l.rotation.x=0); }); release(order); };
  return {kind:'soccer', cancel:finish, update(dt,t){
    pt+=dt;
    const faceToward=(k,target)=>{ const dx=target.x-k.pos.x, dz=target.z-k.pos.z;
      if(dx*dx+dz*dz>1e-4){ const want=Math.atan2(dx,dz); let diff=want-k.heading;
        while(diff>Math.PI)diff-=Math.PI*2; while(diff<-Math.PI)diff+=Math.PI*2;
        k.heading+=diff*Math.min(1,dt*8); k.g.rotation.y=k.heading; } };
    if(phase==='gather'){
      let all=true;
      order.forEach((k,i)=>{ const d=k.moveToward(spots[i],dt,0.9); k.locomote(dt,t); if(d>=0.7) all=false; });
      handPos(bami,tv); ball.position.copy(tv); ball.position.y=0.55;
      if(all || pt>10){ phase='pass'; pt=0; segT=0; passIdx=0; bami.say('다같이 축구하자!'); }
    } else if(phase==='pass'){
      segT+=dt;
      const passDur=1.5;
      const from=order[passIdx];
      const isShot = passIdx===order.length-1;
      const to = isShot?null:order[passIdx+1];
      handPos(from,fromV);
      const target = isShot ? goalTarget : (handPos(to,toV), toV);
      /* 시선: 패스하는 아이는 목표를, 나머지는 공을 본다 */
      order.forEach(k=>{ if(k!==from){ faceToward(k, ball.position); k.idle(); k.locomote(dt,t); } });
      faceToward(from, target); from.idle(); from.locomote(dt,t);
      if(from.b.legs?.length>=2) from.b.legs[0].rotation.x = segT<0.32 ? -1.1*(1-segT/0.32) : 0;
      const u=Math.min(1,segT/passDur);
      const e=u<0.5?2*u*u:1-Math.pow(-2*u+2,2)/2;
      ball.position.lerpVectors(fromV,target,e);
      ball.position.y += Math.sin(u*Math.PI)*(isShot?2.6:1.0);
      ball.rotation.x += dt*7; ball.rotation.z -= dt*5;
      if(segT<dt*1.5){ from.say(isShot?'슛!':(passIdx===0?'간다, 패스!':pick(['패스!','받아!','여기야!']))); }
      if(segT>=passDur){
        if(isShot){ phase='goal'; pt=0; scored=false; }
        else { to.say(pick(['오케이!','받았어!','좋아!'])); passIdx++; segT=0; }
      }
    } else { /* goal */
      if(!scored){ scored=true; ball.position.copy(goalTarget);
        puff(sparkTex, goalTarget.clone(), 10, {size:0.8, life:1.2});
        order[order.length-1].say('골인! ⚽'); }
      ball.position.lerp(new THREE.Vector3(goalTarget.x,0.55,goalTarget.z), Math.min(1,dt*2.5));
      order.forEach((k,i)=>{ k.idle(); k.locomote(dt,t);
        k.g.position.y = Math.abs(Math.sin(t*6+i))*0.4;
        if(k.b.arms?.length>=2){ k.b.arms[0].rotation.z=2.1; k.b.arms[1].rotation.z=-2.1; } });
      if(!cheered && pt>0.8){ cheered=true; bami.say('우리 팀 최고!'); }
      if(Math.random()<dt*3) puff(Math.random()<0.5?heartTex:sparkTex, goalTarget.clone().setY(2),1,{size:0.6});
      if(pt>4){ finish(); return true; }
    }
    return false;
  }};
}
function tryStartScheduledSoccer(){
  const plan = dueDailyPlan('soccer', 8, 12);
  if(!plan) return null;
  const ev = limitEventDuration(makeSoccerEvt());
  if(ev) markDailyPlanFired('soccer', plan);
  return ev;
}

function dateKey(now=new Date()){
  const p = n => String(n).padStart(2,'0');
  return `${now.getFullYear()}-${p(now.getMonth()+1)}-${p(now.getDate())}`;
}
function minuteOfDay(now=new Date()){ return now.getHours()*60 + now.getMinutes(); }
const planFallback = new Map();
function saveDailyPlan(kind, plan){
  planFallback.set(kind, plan);
  try{ localStorage.setItem(`openworld.${kind}.${plan.date}`, JSON.stringify(plan)); }catch{}
}
function getDailyPlan(kind, startHour, endHour, choices=null){
  const date = dateKey();
  const key = `openworld.${kind}.${date}`;
  let plan = null;
  try{ plan = JSON.parse(localStorage.getItem(key) || 'null'); }catch{}
  if(!plan) plan = planFallback.get(kind);
  if(!plan || plan.date !== date){
    const span = Math.max(1, (endHour-startHour)*60);
    plan = {
      date, fired:false,
      minute:startHour*60 + Math.floor(Math.random()*span)
    };
    if(choices?.length) plan.choice = pick(choices);
    saveDailyPlan(kind, plan);
  }
  return plan;
}
function markDailyPlanFired(kind, plan){
  plan.fired = true;
  saveDailyPlan(kind, plan);
}
function dueDailyPlan(kind, startHour, endHour, choices=null){
  const now = new Date();
  const plan = getDailyPlan(kind, startHour, endHour, choices);
  const m = minuteOfDay(now);
  if(plan.fired || m < startHour*60 || m >= endHour*60 || m < plan.minute) return null;
  return plan;
}
let sudalChalkNextFallback = 0;
function scheduleNextSudalChalk(now=Date.now()){
  const next = now + (52 + Math.random()*16) * 60 * 1000;
  sudalChalkNextFallback = next;
  try{ localStorage.setItem(SUDAL_CHALK_KEY, String(Math.round(next))); }catch{}
  return next;
}
function getSudalChalkNextAt(now=Date.now()){
  let next = sudalChalkNextFallback;
  try{ next = Number(localStorage.getItem(SUDAL_CHALK_KEY) || next || 0); }catch{}
  if(!Number.isFinite(next) || next <= 0 || next < now - 70*60*1000){
    next = scheduleNextSudalChalk(now);
  }
  return next;
}
function tryStartScheduledSudalChalk(){
  const now = Date.now();
  if(now < getSudalChalkNextAt(now)) return null;
  const ev = limitEventDuration(makeSudalChalkEvt());
  if(ev) scheduleNextSudalChalk(now);
  return ev;
}

const MATH_RECITE = [
  '2 x 3 = 6','3 x 4 = 12','4 x 6 = 24','5 x 7 = 35','6 x 8 = 48','7 x 8 = 56','8 x 9 = 72','9 x 6 = 54',
  '1m = 100cm','1km = 1000m','1cm = 10mm','1시간 = 60분','1분 = 60초','1L = 1000mL','1kg = 1000g'
];
function makeMathGuestEvt(guestId=null){
  const def = MATH_GUESTS.find(g=>g.id===guestId || g.name===guestId) ?? pick(MATH_GUESTS);
  const guest = createMathGuest(def);
  const center = new THREE.Vector3(-4,0,5);
  const R = 10.8;
  const members = kids.map((k,i)=>({
    k, ang:i/kids.length*Math.PI*2, radius:R + (i%3-1)*0.7,
    noteT:1+Math.random()*2
  }));
  const skyY = 46, dropDur = 2.6;
  scene.add(guest.group);
  guest.group.position.set(center.x, skyY, center.z);
  guest.group.scale.setScalar(0.25);
  if(guest.model){ guest.model.rotation.set(0, guest.faceYaw, 0); } /* 낙하 중 정면 */
  if(guest.guestShadow){ guest.guestShadow.scale.setScalar(0.25); guest.guestShadow.material.opacity = 0.04; }
  members.forEach(m=>{
    m.k.state='event';
    m.k.gotoTarget=null; m.k.celebT=0; m.k.startleT=0; m.k.walkAmt=0;
  });
  let pt=0, nextSay=999, landed=false; /* 첫 대사는 착지 직후 */
  let reciteT = 7, reciteIdx = Math.floor(Math.random()*members.length); /* 아이들이 돌아가며 구구단/단위 암송 */
  const tv = new THREE.Vector3();
  let cleaned = false;
  const finish = ()=>{
    if(cleaned) return;
    cleaned = true;
    guest.clear();
    scene.remove(guest.group);
    members.forEach(m=>{
      if(m.k.b.arms?.length >= 2){
        m.k.b.arms[0].rotation.z = 0; m.k.b.arms[1].rotation.z = 0;
      }
    });
    release(members);
  };
  return {kind:'mathGuest', guest:def.name, cancel:finish, update(dt,t){
    pt += dt;
    guest.update?.(dt); /* GLB 애니메이션 클립 재생 */
    const outro = pt > 84 ? 1-THREE.MathUtils.smoothstep((pt-84)/6, 0, 1) : 1;

    if(pt < dropDur){
      /* 하늘에서 점점 커지면서 떨어지는 등장 */
      const u = pt/dropDur;
      const e = 1-Math.pow(1-u,3); /* easeOutCubic 낙하 */
      guest.group.position.set(center.x, THREE.MathUtils.lerp(skyY, 0, e), center.z);
      guest.group.scale.setScalar(THREE.MathUtils.lerp(0.25, 1, u));
      if(guest.guestShadow){
        guest.guestShadow.scale.setScalar(THREE.MathUtils.lerp(0.25, 1, e));
        guest.guestShadow.material.opacity = THREE.MathUtils.lerp(0.04, 0.2, e);
      }
      if(guest.model){
        const bs=guest.model.userData.baseScale||1;
        guest.model.position.copy(guest.basePos);
        guest.model.rotation.set(0, guest.faceYaw, 0); /* 낙하 중에도 항상 정면 */
        guest.model.scale.setScalar(bs);
      }
    } else {
      if(!landed){
        landed = true;
        guest.group.position.set(center.x, 0, center.z);
        guest.group.scale.setScalar(1);
        if(guest.model) guest.model.rotation.set(0, guest.faceYaw, 0);
        guest.say(`${def.name} 등장! 수학 시작!`);
        nextSay = pt + 11 + Math.random()*4;
        puff(sparkTex, new THREE.Vector3(center.x+guest.basePos.x, 0.5, center.z+guest.basePos.z), 10, {size:0.9, life:1.1});
      }
      guest.group.position.z = center.z + Math.sin(t*0.55)*0.25;
      guest.group.position.y = Math.sin(t*1.7)*0.12;
      guest.group.scale.setScalar(Math.max(0.05, outro));

      /* 코기코/알라코 이벤트 움직임: 항상 정면을 보며 제자리 -> 좌우 -> 빠른 제자리(겅중겅중) 반복 */
      if(guest.model){
        const m = guest.model, bs = m.userData.baseScale||1, danceT = Math.max(0, pt-dropDur);
        const phase = danceT % 11;
        let x = guest.basePos.x, y = guest.basePos.y, lean = 0, hopPower = 0;
        if(phase < 3){
          /* 제자리 뛰기 */
          hopPower = Math.abs(Math.sin(phase*Math.PI*1.2))*0.6;
          y += hopPower;
        } else if(phase < 7){
          /* 좌우로 뛰기 */
          const u = (phase-3)/4;
          x += Math.sin(u*Math.PI*4)*1.25;
          hopPower = Math.abs(Math.sin(u*Math.PI*8))*0.7;
          y += hopPower;
          lean = Math.cos(u*Math.PI*4)*0.07; /* 진행 방향으로 살짝 기울임(정면 유지) */
        } else {
          /* 신나게 겅중겅중 */
          const u = (phase-7)/4;
          hopPower = Math.abs(Math.sin(u*Math.PI*6))*0.85;
          y += hopPower;
        }
        m.position.set(x, y, guest.basePos.z);
        m.rotation.set(0, guest.faceYaw, lean); /* yaw 고정 = 절대 등 안 보임 */
        const sq = 1 + Math.min(0.08, hopPower*0.08);
        m.scale.set(bs/sq, bs*sq, bs/sq); /* 정규화 배율 위에 스쿼시 */
        if(danceT > 0 && Math.random() < dt*2.4){
          const sparkPos = guest.group.localToWorld(new THREE.Vector3(m.position.x, m.position.y+4.2, m.position.z));
          puff(Math.random()<0.5?noteTex:sparkTex, sparkPos, 1, {size:0.7, life:1.2});
        }
      }
    }

    if(pt >= nextSay && pt < 82){
      guest.say(pt < 4 ? `${def.name} 등장! 수학 공부 시작!` : pick(def.lines));
      nextSay += 11 + Math.random()*4;
    }

    /* 아이들이 한 명씩 돌아가며 구구단/단위변환을 외침 */
    if(landed && pt < 86){
      reciteT -= dt;
      if(reciteT <= 0){
        const m = members[reciteIdx % members.length]; reciteIdx++;
        if(m && m.k.state==='event') m.k.say(pick(MATH_RECITE));
        reciteT = 3.0 + Math.random()*1.6;
      }
    }

    for(const [i,m] of members.entries()){
      const danceT = Math.max(0, pt-8);
      const a = m.ang + danceT*0.34;
      tv.set(center.x + Math.cos(a)*m.radius, 0, center.z + Math.sin(a)*m.radius);
      if(pt < 8){
        const d = m.k.moveToward(tv, dt, 1.25);
        m.k.locomote(dt,t);
        if(d < 1.2) m.k.idle();
      } else {
        m.k.g.position.x = tv.x;
        m.k.g.position.z = tv.z;
        m.k.heading = Math.atan2(center.x-m.k.pos.x, center.z-m.k.pos.z);
        m.k.g.rotation.y = m.k.heading + Math.sin(t*3+i)*0.18;
        m.k.walkAmt = 0.8;
        m.k.locomote(dt,t);
        m.k.g.position.y += Math.abs(Math.sin(t*3.2+i))*0.42;
        if(m.k.b.arms?.length >= 2){
          m.k.b.arms[0].rotation.z = 2.2 + Math.sin(t*3+i)*0.35;
          m.k.b.arms[1].rotation.z = -2.2 - Math.sin(t*3+i)*0.35;
        }
        m.noteT -= dt;
        if(m.noteT <= 0){
          puff(Math.random()<0.45?qTex:noteTex, m.k.pos.clone().setY(2.5), 1, {size:0.55});
          m.noteT = 1.3 + Math.random()*1.7;
        }
      }
    }

    if(Math.random() < dt*1.8) puff(sparkTex, center.clone().setY(8.5), 1, {size:0.9, life:1.6});
    if(pt < 90) return false;
    finish();
    return true;
  }};
}
function makePadakFlyEvt(){
  const k = kids.find(kid=>kid.name==='파닥이' && kid.state==='play');
  if(!k) return null;
  k.state = 'event';
  k.gotoTarget = null; k.celebT = 0; k.startleT = 0; k.walkAmt = 0;
  const baseY = k.g.position.y;
  const peakH = 9;
  let phase = 'up', pt = 0, said = false;
  return {kind:'padakFly', update(dt,t){
    pt += dt;
    const flap = Math.sin(t*18);
    if(k.b.arms?.length >= 2){
      k.b.arms[0].rotation.z = 1.0 + flap*1.2;
      k.b.arms[1].rotation.z = -1.0 - flap*1.2;
    }
    if(phase === 'up'){
      if(!said){ said=true; k.say('하늘을 날고 싶어!'); }
      const u = Math.min(1, pt/2.2);
      const e = Math.sin(u*Math.PI/2);
      k.g.position.y = baseY + e*peakH;
      k.g.rotation.x = -0.3*e;
      if(Math.random() < dt*8) puff(sparkTex, k.pos.clone(), 1, {size:0.4, life:0.8});
      if(u >= 1){ phase='hover'; pt=0; said=false; }
    } else if(phase === 'hover'){
      k.g.position.y = baseY + peakH + Math.sin(t*2.4)*0.4;
      k.g.rotation.x = Math.sin(t*2.4)*0.08;
      k.heading += dt*1.1; k.g.rotation.y = k.heading;
      if(Math.random() < dt*4) puff(sparkTex, k.pos.clone(), 1, {size:0.45, life:0.9});
      if(!said && pt > 0.6){ said=true; k.say(pick(['야호, 신난다!','바람이 좋아~'])); }
      if(pt > 3){ phase='down'; pt=0; }
    } else if(phase === 'down'){
      const u = Math.min(1, pt/2.2);
      const e = 1-Math.sin(u*Math.PI/2);
      k.g.position.y = baseY + e*peakH;
      k.g.rotation.x = -0.3*e;
      if(Math.random() < dt*6) puff(sparkTex, k.pos.clone(), 1, {size:0.4, life:0.8});
      if(u >= 1){ phase='end'; pt=0; }
    } else {
      k.g.position.y = baseY;
      k.g.rotation.x = 0;
      if(k.b.arms?.length >= 2){ k.b.arms[0].rotation.z=0; k.b.arms[1].rotation.z=0; }
      k.idle(); k.locomote(dt,t);
      if(!said){ said=true; k.say('잘 다녀왔어!'); }
      if(pt > 1.2){ release([k]); return true; }
    }
    return false;
  }};
}
